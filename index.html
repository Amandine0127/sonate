<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sonate</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0e0d0d;--bg2:#181616;--bg3:#221f1f;--sur:#2a2626;--bdr:#332e2e;--acc:#c8954a;--acc2:#e8b97a;--txt:#f0ece6;--mut:#888;--ph:88px;--rad:10px;--tr:0.2s ease}
[data-theme=light]{--bg:#f5f2ee;--bg2:#ede9e3;--bg3:#e2dcd5;--sur:#d8d1c8;--bdr:#c8bfb4;--acc:#a0682a;--acc2:#c88840;--txt:#1a1614;--mut:#6a6056}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:inherit;outline:none;border:none;background:none;color:inherit}

#app{display:grid;grid-template-rows:1fr var(--ph);height:100vh}
#main{overflow-y:auto;display:flex;flex-direction:column;min-height:0}

/* Topbar */
#topbar{position:sticky;top:0;z-index:20;background:linear-gradient(to bottom,var(--bg) 70%,transparent);padding:14px 16px 10px;display:flex;align-items:center;gap:10px}
.sbox{flex:1;display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--bdr);border-radius:30px;padding:8px 14px;transition:border-color var(--tr)}
.sbox:focus-within{border-color:var(--acc)}
.sbox input{flex:1;font-size:14px}
.sbox input::placeholder{color:var(--mut)}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;flex-shrink:0}
.ver{font-size:10px;color:var(--mut)}

/* Barre genres sticky sous topbar */
#gbar{position:sticky;top:56px;z-index:19;background:var(--bg);padding:6px 16px 8px;display:flex;gap:8px;overflow-x:auto;border-bottom:1px solid var(--bdr)}
#gbar::-webkit-scrollbar{display:none}
.gbtn{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;background:var(--bg2);border:1px solid var(--bdr);color:var(--mut);transition:background var(--tr),color var(--tr),border-color var(--tr)}
.gbtn:hover,.gbtn.on{background:var(--acc);border-color:var(--acc);color:#fff}

/* Nav tabs */
#tabs{position:sticky;top:100px;z-index:18;background:var(--bg);display:flex;border-bottom:1px solid var(--bdr);padding:0 16px}
.tab{padding:10px 16px;font-size:13px;color:var(--mut);border-bottom:2px solid transparent;transition:color var(--tr),border-color var(--tr);cursor:pointer}
.tab.on{color:var(--acc2);border-bottom-color:var(--acc)}

/* Content */
#content{padding:0 16px 100px;flex:1}
.sec{font-size:18px;font-weight:600;margin:20px 0 10px}
.sec em{font-style:italic;color:var(--acc2);font-family:'Playfair Display',serif}

/* Tracklist */
.tlist{display:flex;flex-direction:column;gap:2px}
.trow{display:grid;grid-template-columns:40px 1fr 32px;align-items:center;gap:10px;padding:7px 4px;border-radius:8px;cursor:pointer;transition:background var(--tr)}
.trow:hover{background:var(--bg2)}
.trow.on{color:var(--acc2)}
.tthumb{width:40px;height:40px;border-radius:4px;object-fit:cover;background:var(--sur)}
.tinfo .tname{font-size:13px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tinfo .tartist{font-size:11px;color:var(--mut);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* Coeur toujours visible */
.tlike{display:flex;align-items:center;justify-content:center;color:#bbb;transition:color var(--tr)}
[data-theme=light] .tlike{color:#888}
.tlike.on{color:var(--acc)}
.tlike:hover{color:var(--acc2)}

/* Loading */
.loading{display:flex;flex-direction:column;align-items:center;gap:14px;padding:50px 0;color:var(--mut);font-size:14px}
.spin{width:28px;height:28px;border:3px solid var(--bdr);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Recos */
.rlist{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px}
.rlist::-webkit-scrollbar{height:3px}
.rlist::-webkit-scrollbar-thumb{background:var(--bdr)}
.rcard{flex-shrink:0;width:120px;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--rad);padding:8px;cursor:pointer;transition:background var(--tr)}
.rcard:hover{background:var(--bg3)}
.rthumb{width:100%;aspect-ratio:1;border-radius:5px;object-fit:cover;background:var(--sur);display:block;margin-bottom:6px}
.rtitle{font-size:11px;font-weight:500;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rsub{font-size:10px;color:var(--mut);margin-top:2px}

/* Player */
#player{background:var(--bg2);border-top:1px solid var(--bdr);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 12px;gap:6px;height:var(--ph)}
.np{display:flex;align-items:center;gap:8px;min-width:0}
.np-art{width:44px;height:44px;border-radius:6px;background:var(--sur);flex-shrink:0;overflow:hidden;position:relative}
.np-art img{width:100%;height:100%;object-fit:cover;display:none;position:absolute;inset:0}
.np-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.np-info{min-width:0}
.np-title{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.np-artist{font-size:11px;color:var(--mut)}
.np-like{flex-shrink:0;padding:4px;color:var(--mut);transition:color var(--tr)}
.np-like.on{color:var(--acc)}
.pctrl{display:flex;flex-direction:column;align-items:center;gap:5px}
.pbtns{display:flex;align-items:center;gap:14px}
.pbtn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;color:var(--mut);transition:color var(--tr)}
.pbtn:hover{color:var(--txt)}
.pplay{width:38px;height:38px;background:var(--acc);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background var(--tr)}
.pplay:hover{background:var(--acc2)}
.prog{display:flex;align-items:center;gap:6px;width:100%}
.ptime{font-size:10px;color:var(--mut);min-width:26px}
.ptime.r{text-align:right}
.pbar{flex:1;height:4px;background:var(--bdr);border-radius:2px;cursor:pointer}
.pfill{height:100%;background:var(--acc);border-radius:2px;width:0}
.pright{display:flex;align-items:center;justify-content:flex-end;gap:6px}
.pvol{display:flex;align-items:center;gap:5px}
.pvolbar{width:60px;height:4px;background:var(--bdr);border-radius:2px;cursor:pointer}
.pvolfill{height:100%;background:var(--mut);border-radius:2px;width:70%}

/* YT Panel */
#ytp{position:fixed;top:60px;right:10px;width:285px;border-radius:10px;overflow:hidden;border:1px solid var(--bdr);box-shadow:0 8px 32px rgba(0,0,0,.6);display:none;z-index:50}
#ytp.on{display:block}
#ytdrag{background:var(--bg3);padding:5px 10px;display:flex;align-items:center;justify-content:space-between;cursor:grab;touch-action:none;user-select:none}
#ytdrag span{font-size:11px;color:var(--mut)}
#ytvid{background:#000}
#ytbar{background:var(--bg2);padding:7px 10px;display:flex;align-items:center;gap:8px}
.ynp{flex:1;min-width:0}
.ynt{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.yna{font-size:11px;color:var(--mut)}
.yimg{width:32px;height:32px;border-radius:4px;object-fit:cover;background:var(--sur);flex-shrink:0;display:none}
.ybtns{display:flex;align-items:center;gap:6px;flex-shrink:0}
.ybtn{width:26px;height:26px;display:flex;align-items:center;justify-content:center;color:var(--mut);transition:color var(--tr)}
.ybtn:hover{color:var(--txt)}
.yplay{width:30px;height:30px;background:var(--acc);border-radius:50%;display:flex;align-items:center;justify-content:center}

/* Toast */
#toast{position:fixed;bottom:calc(var(--ph) + 12px);left:50%;transform:translateX(-50%) translateY(8px);background:var(--sur);border:1px solid var(--bdr);font-size:13px;padding:8px 16px;border-radius:20px;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;white-space:nowrap;z-index:200}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

.eq{display:flex;align-items:flex-end;gap:2px;height:14px}
.eq span{width:3px;background:var(--acc);border-radius:1px;animation:eq .7s ease-in-out infinite alternate}
.eq span:nth-child(1){height:40%;animation-delay:0s}
.eq span:nth-child(2){height:100%;animation-delay:.15s}
.eq span:nth-child(3){height:60%;animation-delay:.3s}
.eq span:nth-child(4){height:80%;animation-delay:.1s}
@keyframes eq{from{transform:scaleY(.25)}to{transform:scaleY(1)}}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}
</style>
</head>
<body>
<div id="app">
  <div id="main">
    <div id="topbar">
      <div class="sbox">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="sinput" type="text" placeholder="Rechercher un titre, un artiste&hellip;" onkeydown="onKey(event)"/>
      </div>
      <div class="avatar">S</div>
      <span class="ver">v13</span>
    </div>

    <!-- Genres en boutons sticky -->
    <div id="gbar"></div>

    <!-- Tabs nav -->
    <div id="tabs">
      <div class="tab on" onclick="showTab('home',this)">Accueil</div>
      <div class="tab" onclick="showTab('search',this)">Recherche</div>
      <div class="tab" onclick="showTab('favs',this)">Favoris</div>

    <div id="content">
      <div id="vhome">
        <p class="sec">Bonne &eacute;coute, <em>Sandra</em></p>
        <div id="vhist"></div>
        <div id="vreco" style="display:none">
          <p class="sec" style="margin-top:24px">Similaires</p>
          <div class="rlist" id="rlist"></div>
        </div>
      </div>
      <div id="vsearch" style="display:none">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:16px;margin-bottom:10px">
          <p class="sec" style="margin:0" id="stitle">Recherche</p>
          <span id="scount" style="font-size:12px;color:var(--mut)"></span>
        </div>
        <div id="sresults"><div class="loading"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>Tapez votre recherche</div></div>
      </div>

        <p class="sec">Titres <em>aim&eacute;s</em></p>
        <div id="flist"></div>
      </div>

  </div>

  <!-- Player -->
  <div id="player">
    <div class="np">
      <div class="np-art" id="npart">
        <div class="np-ph" id="npph"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--mut)" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div>
        <img id="npimg" src="" alt=""/>
      </div>
      <div class="np-info">
        <div class="np-title" id="nptitle">&mdash; Aucun titre &mdash;</div>
        <div class="np-artist" id="npartist">Sonate</div>
      </div>
      <button class="np-like" id="nplike" onclick="toggleLike()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
      </button>
    </div>
    <div class="pctrl">
      <div class="pbtns">
        <button class="pbtn" id="bshuffle" onclick="toggleShuffle()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg></button>
        <button class="pbtn" onclick="prevT()"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"/></svg></button>

        <button class="pbtn" onclick="nextT()"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"/></svg></button>
        <button class="pbtn" id="brepeat" onclick="toggleRepeat()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg></button>

      <div class="pvol">
        <button class="pbtn" onclick="toggleMute()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 010 7.07"/></svg></button>
        <div class="pvolbar" onclick="setVol(event)"><div class="pvolfill" id="vfill"></div></div>
      </div>
      <button class="pbtn" onclick="toggleTheme()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
    </div>
  </div>
</div>

<!-- YT Panel -->
<div id="ytp">
  <div id="ytdrag">
    <span>&#9776; D&eacute;placer</span>
    <div style="display:flex;gap:6px;align-items:center">
      <button class="ybtn" onclick="toggleVid()" style="font-size:11px;background:var(--bg2);border-radius:10px;padding:2px 8px;width:auto;height:auto">Vid&eacute;o</button>
      <button class="ybtn" onclick="closeYTP()" style="font-size:18px;line-height:1">&times;</button>

  </div>
  <div id="ytvid"></div>
  <div id="ytbar">
    <img class="yimg" id="ytimg" src="" alt=""/>
    <div class="ynp">
      <div class="ynt" id="ytitle">&mdash;</div>
      <div class="yna" id="yartist">&mdash;</div>
    </div>
    <div class="ybtns">
      <button class="ybtn" onclick="prevT()"><svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"/></svg></button>
      <button class="yplay" onclick="togglePlay()"><svg id="ypico" width="12" height="12" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg></button>
      <button class="ybtn" onclick="nextT()"><svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"/></svg></button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/eruda@3/eruda.min.js"></script>
<script>
  eruda.init({
    container: document.body,
    tool: ['console','elements','network','info'],
    useShadowDom: false
  });
  // Forcer le bouton eruda au-dessus du player
  var erudaBtn = document.querySelector('.eruda-entry-btn');
  if (erudaBtn) { erudaBtn.style.bottom = (parseInt(getComputedStyle(document.documentElement).getPropertyValue('--ph')) + 20) + 'px'; }
</script>
<script>
// ─── CONFIG ───────────────────────────────────────────────────────
var KEY = 'AIzaSyAGo-7ERB8T7jr0xzIBsFDWjN5fNQbjAMQ';
var GENRES = [
  {n:'Power Metal',     q:'power metal official music video',  ic:'⚔️'},
  {n:'Symphonic',       q:'symphonic metal official',          ic:'🎻'},
  {n:'Épique',          q:'epic orchestral metal music',       ic:'🏰'},
  {n:'Viking Metal',    q:'viking metal folk official',        ic:'🪖'},
  {n:'Folk Metal',      q:'folk metal official music video',   ic:'🪕'},
  {n:'Heavy Metal',     q:'heavy metal classic official',      ic:'🤘'}
];

// ─── ÉTAT ─────────────────────────────────────────────────────────
var tracks = { search:[], hist:[], favs:[], reco:[] };
var cur = null;
var curSrc = '';
var curIdx = -1;
var playing = false;
var shuffle = false;
var repeat  = false;
var muted   = false;
var vol     = 70;
var liked   = {};
var favd    = {};
var theme   = 'dark';
var vidHide = false;
var lastRecoVid = '';

// ─── INIT ─────────────────────────────────────────────────────────
function init() {
  try { liked = JSON.parse(localStorage.getItem('snt_liked') || '{}'); } catch(e) {}
  try { favd  = JSON.parse(localStorage.getItem('snt_favd')  || '{}'); } catch(e) {}
  try { tracks.hist = JSON.parse(localStorage.getItem('snt_hist') || '[]'); } catch(e) {}
  theme = localStorage.getItem('snt_theme') || 'dark';
  applyTheme(theme);
  renderGbar();
  renderHist();
  renderFavs();
  initDrag();
}
document.addEventListener('DOMContentLoaded', init);

// ─── GENRES BAR ───────────────────────────────────────────────────
function renderGbar() {
  var html = '';
  for (var i = 0; i < GENRES.length; i++) {
    html += '<button class="gbtn" onclick="searchGenre(' + i + ')">' + GENRES[i].ic + ' ' + GENRES[i].n + '</button>';
  }
  document.getElementById('gbar').innerHTML = html;
}

function searchGenre(i) {
  document.getElementById('sinput').value = GENRES[i].q;
  showTab('search', document.querySelector('.tab:nth-child(2)'));
  doSearch(GENRES[i].q);
}

// ─── TABS ─────────────────────────────────────────────────────────
function showTab(name, el) {
  var map = {home:'vhome', search:'vsearch', favs:'vfavs'};
  var keys = Object.keys(map);
  for (var i = 0; i < keys.length; i++) {
    document.getElementById(map[keys[i]]).style.display = keys[i] === name ? '' : 'none';
  }
  var tabs = document.querySelectorAll('.tab');
  for (var j = 0; j < tabs.length; j++) { tabs[j].classList.remove('on'); }
  if (el) { el.classList.add('on'); }
  if (name === 'favs') { renderFavs(); }
}

// ─── SEARCH ───────────────────────────────────────────────────────
function onKey(e) {
  if (e.key !== 'Enter') { return; }
  var q = e.target.value.trim();
  if (!q) { return; }
  showTab('search', document.querySelector('.tab:nth-child(2)'));
  doSearch(q);
}

function doSearch(q) {
  document.getElementById('stitle').textContent = '"' + q + '"';
  document.getElementById('scount').textContent = '';
  document.getElementById('sresults').innerHTML = '<div class="loading"><div class="spin"></div>Recherche\u2026</div>';
  var url = 'https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoCategoryId=10&maxResults=15&q='
    + encodeURIComponent(q) + '&key=' + KEY;
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.error) {
        document.getElementById('sresults').innerHTML = '<div class="loading">' + esc(d.error.message) + '</div>';
        return;
      }
      var items = d.items || [];
      tracks.search = [];
      for (var i = 0; i < items.length; i++) {
        var it = items[i];
        var sn = it.snippet;
        var th = sn.thumbnails && sn.thumbnails.medium ? sn.thumbnails.medium.url : '';
        tracks.search.push({id:it.id.videoId, title:sn.title, artist:sn.channelTitle, thumb:th});
      }
      document.getElementById('scount').textContent = tracks.search.length + ' r\u00e9sultats';
      document.getElementById('sresults').innerHTML = renderList('search');
    })
    .catch(function() {
      document.getElementById('sresults').innerHTML = '<div class="loading">Erreur r\u00e9seau</div>';
    });
}

// ─── RENDER ───────────────────────────────────────────────────────
function renderList(src) {
  var arr = tracks[src];
  if (!arr || !arr.length) {
    return '<p style="color:var(--mut);font-size:14px;padding:8px 0">Aucun titre.</p>';
  }
  var html = '<div class="tlist">';
  for (var i = 0; i < arr.length; i++) { html += rowHTML(src, i); }
  html += '</div>';
  return html;
}

function rowHTML(src, i) {
  var t = tracks[src][i];
  var isOn = cur && cur.id === t.id;
  var isLiked = !!liked[t.id];
  var eq = isOn && playing ? '<div class="eq"><span></span><span></span><span></span><span></span></div>' : '';
  return '<div class="trow' + (isOn ? ' on' : '') + '" onclick="play(\'' + src + '\',' + i + ')">'
    + '<img class="tthumb" src="' + esc(t.thumb) + '" onerror="this.style.visibility=\'hidden\'"/>'
    + '<div class="tinfo">'
    + (eq ? '<div class="tname">' + eq + '</div>' : '<div class="tname">' + esc(t.title) + '</div>')
    + '<div class="tartist">' + esc(t.artist) + '</div></div>'
    + '<button class="tlike' + (isLiked ? ' on' : '') + '" onclick="event.stopPropagation();like(\''
    + esc2(t.id) + '\',\'' + esc2(t.title) + '\',\'' + esc2(t.artist) + '\',\'' + esc2(t.thumb) + '\')">'
    + '<svg width="15" height="15" viewBox="0 0 24 24" fill="' + (isLiked ? 'currentColor' : 'none') + '" stroke="currentColor" stroke-width="2.5"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>'
    + '</button></div>';
}

function renderHist() {
  var w = document.getElementById('vhist');
  if (!tracks.hist.length) {
    w.innerHTML = '<p style="color:var(--mut);font-size:14px;padding:4px 0">Cliquez sur un genre ou lancez une recherche.</p>';
    return;
  }
  w.innerHTML = renderList('hist');
}

function renderFavs() {
  var keys = Object.keys(liked);
  tracks.favs = [];
  for (var i = 0; i < keys.length; i++) {
    if (favd[keys[i]]) { tracks.favs.push(favd[keys[i]]); }
  }
  var w = document.getElementById('flist');
  w.innerHTML = tracks.favs.length ? renderList('favs') : '<p style="color:var(--mut);font-size:14px;padding:4px 0">Aucun favori.</p>';
}

function refreshAll() {
  renderHist();
  renderFavs();
  if (document.getElementById('sresults').querySelector('.tlist') && tracks.search.length) {
    document.getElementById('sresults').innerHTML = renderList('search');
  }
}

// ─── PLAY ─────────────────────────────────────────────────────────
function play(src, i) {
  var t = tracks[src] && tracks[src][i];
  if (!t) { console.log('play: introuvable', src, i); return; }
  curSrc = src;
  curIdx = i;
  cur = t;
  playing = true;
  loadEmbed(t.id, true);
  updNP(t);
  addHist(t);
  loadReco(t.id);
  refreshAll();
  toast('\u25b6 ' + t.title);
}

function togglePlay() {
  if (!cur) { toast('S\u00e9lectionnez un titre'); return; }
  playing = !playing;
  loadEmbed(cur.id, playing);
  updPlayIco();
}

function prevT() {
  if (curSrc && curIdx > 0) { play(curSrc, curIdx - 1); }
}

function nextT() {
  if (!curSrc) { return; }
  var arr = tracks[curSrc];
  if (!arr || !arr.length) { return; }
  var n;
  if (shuffle) { n = Math.floor(Math.random() * arr.length); }
  else if (repeat) { n = curIdx; }
  else { n = (curIdx + 1) % arr.length; }
  play(curSrc, n);
}

function toggleShuffle() {
  shuffle = !shuffle;
  document.getElementById('bshuffle').style.color = shuffle ? 'var(--acc)' : '';
  toast(shuffle ? 'Al\u00e9atoire ON' : 'Al\u00e9atoire OFF');
}

function toggleRepeat() {
  repeat = !repeat;
  document.getElementById('brepeat').style.color = repeat ? 'var(--acc)' : '';
  toast(repeat ? 'R\u00e9p\u00e9tition ON' : 'R\u00e9p\u00e9tition OFF');
}

// ─── HISTORIQUE ───────────────────────────────────────────────────
function addHist(t) {
  var filtered = [];
  for (var i = 0; i < tracks.hist.length; i++) {
    if (tracks.hist[i].id !== t.id) { filtered.push(tracks.hist[i]); }
  }
  tracks.hist = [t].concat(filtered).slice(0, 20);
  try { localStorage.setItem('snt_hist', JSON.stringify(tracks.hist)); } catch(e) {}
}

// ─── LIKE ─────────────────────────────────────────────────────────
function like(id, title, artist, thumb) {
  if (liked[id]) {
    delete liked[id];
    delete favd[id];
    toast('Retir\u00e9 des favoris');
  } else {
    liked[id] = true;
    favd[id] = {id:id, title:title, artist:artist, thumb:thumb};
    try { localStorage.setItem('snt_favd', JSON.stringify(favd)); } catch(e) {}
    toast('Ajout\u00e9 aux favoris \u2665');
  }
  try { localStorage.setItem('snt_liked', JSON.stringify(liked)); } catch(e) {}
  refreshAll();
  updLikeBtn();
}

function toggleLike() {
  if (!cur) { return; }
  like(cur.id, cur.title, cur.artist, cur.thumb || '');
}

// ─── EMBED YT ─────────────────────────────────────────────────────
function loadEmbed(vid, autoplay) {
  var src = 'https://www.youtube.com/embed/' + vid
    + '?autoplay=' + (autoplay ? '1' : '0') + '&rel=0&modestbranding=1';
  document.getElementById('ytvid').innerHTML =
    '<iframe src="' + src + '" width="100%" height="185" frameborder="0" allow="autoplay;encrypted-media" allowfullscreen style="display:block"></iframe>';
  document.getElementById('ytp').classList.add('on');
}

// ─── RECOS ────────────────────────────────────────────────────────
function loadReco(vid) {
  if (vid === lastRecoVid) { return; }
  lastRecoVid = vid;
  var url = 'https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&relatedToVideoId='
    + vid + '&videoCategoryId=10&maxResults=8&key=' + KEY;
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (!d.items) { return; }
      tracks.reco = [];
      for (var i = 0; i < d.items.length; i++) {
        var it = d.items[i];
        if (!it.id || !it.id.videoId || it.id.videoId === vid) { continue; }
        var sn = it.snippet;
        var th = sn.thumbnails && sn.thumbnails.medium ? sn.thumbnails.medium.url : '';
        tracks.reco.push({id:it.id.videoId, title:sn.title, artist:sn.channelTitle, thumb:th});
      }
      if (!tracks.reco.length) { return; }
      var html = '';
      for (var j = 0; j < tracks.reco.length; j++) {
        var t = tracks.reco[j];
        html += '<div class="rcard" onclick="play(\'reco\',' + j + ')">'
          + '<img class="rthumb" src="' + esc(t.thumb) + '" onerror="this.style.opacity=.3"/>'
          + '<div class="rtitle">' + esc(t.title) + '</div>'
          + '<div class="rsub">' + esc(t.artist) + '</div></div>';
      }
      document.getElementById('rlist').innerHTML = html;
      document.getElementById('vreco').style.display = '';
    })
    .catch(function() {});
}

// ─── NP / ICÔNES ──────────────────────────────────────────────────
function updNP(t) {
  document.getElementById('nptitle').textContent  = t.title;
  document.getElementById('npartist').textContent = t.artist;
  document.getElementById('ytitle').textContent   = t.title;
  document.getElementById('yartist').textContent  = t.artist;
  var img = document.getElementById('npimg');
  var ph  = document.getElementById('npph');
  var yim = document.getElementById('ytimg');
  if (t.thumb) {
    img.src = t.thumb; img.style.display = ''; ph.style.display = 'none';
    yim.src = t.thumb; yim.style.display = '';
  } else {
    img.style.display = 'none'; ph.style.display = '';
    yim.style.display = 'none';
  }
  updPlayIco();
  updLikeBtn();
}

function updPlayIco() {
  var pause = '<rect x="6" y="4" width="4" height="16" fill="white"/><rect x="14" y="4" width="4" height="16" fill="white"/>';
  var play  = '<polygon points="5 3 19 12 5 21 5 3" fill="white"/>';
  document.getElementById('pico').innerHTML  = playing ? pause : play;
  document.getElementById('ypico').innerHTML = playing ? pause : play;
}

function updLikeBtn() {
  if (!cur) { return; }
  var on = !!liked[cur.id];
  var btn = document.getElementById('nplike');
  btn.classList.toggle('on', on);
  btn.querySelector('svg').setAttribute('fill', on ? 'currentColor' : 'none');
}

// ─── VOLUME ───────────────────────────────────────────────────────
function setVol(e) {
  var rect = e.currentTarget.getBoundingClientRect();
  vol = Math.round(Math.max(0, Math.min(100, (e.clientX - rect.left) / e.currentTarget.offsetWidth * 100)));
  muted = false;
  document.getElementById('vfill').style.width = vol + '%';
}
function toggleMute() {
  muted = !muted;
  document.getElementById('vfill').style.width = muted ? '0' : vol + '%';
}

// ─── YT PANEL ─────────────────────────────────────────────────────
function toggleYTP() { document.getElementById('ytp').classList.toggle('on'); }
function closeYTP()  { document.getElementById('ytp').classList.remove('on'); }
function toggleVid() {
  vidHide = !vidHide;
  document.getElementById('ytvid').style.display = vidHide ? 'none' : '';
}

// ─── DRAG ─────────────────────────────────────────────────────────
function initDrag() {
  var panel  = document.getElementById('ytp');
  var handle = document.getElementById('ytdrag');
  var sx, sy, ox, oy;
  function start(e) {
    var touch = e.touches ? e.touches[0] : e;
    sx = touch.clientX; sy = touch.clientY;
    var r = panel.getBoundingClientRect();
    ox = r.left; oy = r.top;
    panel.style.right = 'auto';
    panel.style.left  = ox + 'px';
    panel.style.top   = oy + 'px';
    document.addEventListener('mousemove', move);
    document.addEventListener('touchmove', move, {passive:false});
    document.addEventListener('mouseup',   stop);
    document.addEventListener('touchend',  stop);
  }
  function move(e) {
    if (e.cancelable) { e.preventDefault(); }
    var touch = e.touches ? e.touches[0] : e;
    var nl = Math.max(0, Math.min(window.innerWidth  - panel.offsetWidth,  ox + touch.clientX - sx));
    var nt = Math.max(0, Math.min(window.innerHeight - panel.offsetHeight, oy + touch.clientY - sy));
    panel.style.left = nl + 'px';
    panel.style.top  = nt + 'px';
  }
  function stop() {
    document.removeEventListener('mousemove', move);
    document.removeEventListener('touchmove', move);
    document.removeEventListener('mouseup',   stop);
    document.removeEventListener('touchend',  stop);
  }
  handle.addEventListener('mousedown',  start);
  handle.addEventListener('touchstart', start, {passive:true});
}

// ─── THÈME ────────────────────────────────────────────────────────
function toggleTheme() {
  theme = theme === 'dark' ? 'light' : 'dark';
  applyTheme(theme);
  try { localStorage.setItem('snt_theme', theme); } catch(e) {}
}
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
}

// ─── CACHE COVERS (7 jours localStorage) ─────────────────────────
// Appelé uniquement si besoin — pas de cover sur cet écran simplifié
// Les genres sont des boutons texte, pas de cover image = 0 appel API au chargement

// ─── UTILS ────────────────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function esc2(s) {
  return String(s || '').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
}
var _tt;
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('on');
  clearTimeout(_tt);
  _tt = setTimeout(function() { el.classList.remove('on'); }, 2400);
}
</script>
