<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sonate</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════════
   VARIABLES & RESET
═══════════════════════════════════════════════ */
:root {
  --bg:#0e0d0d; --bg2:#181616; --bg3:#221f1f; --sur:#2a2626;
  --bdr:#332e2e; --acc:#c8954a; --acc2:#e8b97a;
  --txt:#f0ece6; --mut:#999;
  --ph:88px; --rad:10px; --tr:0.2s ease;
}
[data-theme=light] {
  --bg:#f5f2ee; --bg2:#ede9e3; --bg3:#e2dcd5; --sur:#d8d1c8;
  --bdr:#c8bfb4; --acc:#a0682a; --acc2:#c88840;
  --txt:#1a1614; --mut:#7a6e66;
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html, body { height:100%; font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--txt); overflow:hidden; }
button { font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
input  { font-family:inherit; outline:none; border:none; background:none; color:inherit; }

/* ═══════════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════════ */
#app  { display:grid; grid-template-rows:1fr var(--ph); height:100vh; }
#main { overflow-y:auto; display:flex; flex-direction:column; min-height:0; }

/* ═══════════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════════ */
#topbar {
  position:sticky; top:0; z-index:20;
  background:linear-gradient(to bottom,var(--bg) 70%,transparent);
  padding:14px 16px 10px; display:flex; align-items:center; gap:10px;
}
.sbox {
  flex:1; display:flex; align-items:center; gap:8px;
  background:var(--bg2); border:1px solid var(--bdr); border-radius:30px;
  padding:8px 14px; transition:border-color var(--tr);
}
.sbox:focus-within { border-color:var(--acc); }
.sbox input        { flex:1; font-size:14px; }
.sbox input::placeholder { color:var(--mut); }
.avatar {
  width:32px; height:32px; border-radius:50%;
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:600; color:#fff; flex-shrink:0;
}
.ver { font-size:10px; color:var(--mut); }

/* ═══════════════════════════════════════════════
   GENRES BAR
═══════════════════════════════════════════════ */
#gbar {
  position:sticky; top:56px; z-index:19; background:var(--bg);
  padding:6px 16px 8px; display:flex; gap:8px; overflow-x:auto;
  border-bottom:1px solid var(--bdr);
}
#gbar::-webkit-scrollbar { display:none; }
.gbtn {
  flex-shrink:0; padding:6px 14px; border-radius:20px;
  font-size:12px; font-weight:500;
  background:var(--bg2); border:1px solid var(--bdr); color:var(--mut);
  transition:background var(--tr),color var(--tr),border-color var(--tr);
}
.gbtn:hover, .gbtn.on { background:var(--acc); border-color:var(--acc); color:#fff; }

/* ═══════════════════════════════════════════════
   TABS
═══════════════════════════════════════════════ */
#tabs {
  position:sticky; top:100px; z-index:18; background:var(--bg);
  display:flex; border-bottom:1px solid var(--bdr); padding:0 16px;
}
.tab {
  padding:10px 12px; font-size:13px; color:var(--mut);
  border-bottom:2px solid transparent; cursor:pointer;
  transition:color var(--tr),border-color var(--tr);
}
.tab.on { color:var(--acc2); border-bottom-color:var(--acc); }

/* ═══════════════════════════════════════════════
   CONTENT
═══════════════════════════════════════════════ */
#content { padding:0 16px 100px; flex:1; }
.sec    { font-size:18px; font-weight:600; margin:20px 0 10px; }
.sec em { font-style:italic; color:var(--acc2); font-family:'Playfair Display',serif; }

/* ═══════════════════════════════════════════════
   TRACKLIST
═══════════════════════════════════════════════ */
.tlist { display:flex; flex-direction:column; gap:2px; }
.trow  {
  display:grid; grid-template-columns:40px 1fr auto; align-items:center;
  gap:10px; padding:7px 4px; border-radius:8px; cursor:pointer;
  transition:background var(--tr);
}
.trow:hover  { background:var(--bg2); }
.trow.on     { color:var(--acc2); }
.tthumb      { width:40px; height:40px; border-radius:4px; object-fit:cover; background:var(--sur); }
.tinfo .tname   { font-size:13px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.tinfo .tartist { font-size:11px; color:var(--mut); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tactions { display:flex; align-items:center; gap:2px; flex-shrink:0; }
.tlike {
  display:flex; align-items:center; justify-content:center;
  color:#bbb; transition:color var(--tr); padding:4px;
}
[data-theme=light] .tlike { color:#999; }
.tlike.on    { color:var(--acc); }
.tlike:hover { color:var(--acc2); }
.tadd {
  display:flex; align-items:center; justify-content:center;
  color:#bbb; transition:color var(--tr); padding:4px;
}
[data-theme=light] .tadd { color:#999; }
.tadd:hover { color:var(--acc2); }

/* ═══════════════════════════════════════════════
   LOADING
═══════════════════════════════════════════════ */
.loading { display:flex; flex-direction:column; align-items:center; gap:14px; padding:50px 0; color:var(--mut); font-size:14px; }
.spin    { width:28px; height:28px; border:3px solid var(--bdr); border-top-color:var(--acc); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ═══════════════════════════════════════════════
   RECOS
═══════════════════════════════════════════════ */
.rlist  { display:flex; gap:10px; overflow-x:auto; padding-bottom:6px; }
.rlist::-webkit-scrollbar       { height:3px; }
.rlist::-webkit-scrollbar-thumb { background:var(--bdr); }
.rcard  { flex-shrink:0; width:120px; background:var(--bg2); border:1px solid var(--bdr); border-radius:var(--rad); padding:8px; cursor:pointer; transition:background var(--tr); }
.rcard:hover  { background:var(--bg3); }
.rthumb { width:100%; aspect-ratio:1; border-radius:5px; object-fit:cover; background:var(--sur); display:block; margin-bottom:6px; }
.rtitle { font-size:11px; font-weight:500; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.rsub   { font-size:10px; color:var(--mut); margin-top:2px; }

/* ═══════════════════════════════════════════════
   PLAYLISTS
═══════════════════════════════════════════════ */
.pl-row { display:flex; align-items:center; gap:10px; padding:9px 6px; border-radius:8px; cursor:pointer; transition:background var(--tr); }
.pl-row:hover { background:var(--bg2); }
.pl-icon  { width:40px; height:40px; border-radius:6px; background:var(--sur); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
.pl-info  { flex:1; min-width:0; }
.pl-name  { font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.pl-count { font-size:11px; color:var(--mut); margin-top:2px; }
.pl-del   { color:var(--mut); padding:5px; transition:color var(--tr); }
.pl-del:hover { color:#e55; }
.imp-box {
  display:flex; gap:8px; margin-bottom:12px;
  background:var(--bg2); border:1px solid var(--bdr); border-radius:var(--rad); padding:10px 12px;
}
.imp-box input { flex:1; font-size:13px; }
.imp-btn { flex-shrink:0; padding:6px 14px; border-radius:20px; background:var(--acc); color:#fff; font-size:12px; font-weight:500; transition:background var(--tr); }
.imp-btn:hover { background:var(--acc2); }
.new-pl-box { display:flex; gap:8px; margin-bottom:12px; }
.new-pl-box input { flex:1; background:var(--bg2); border:1px solid var(--bdr); border-radius:var(--rad); padding:8px 12px; font-size:13px; transition:border-color var(--tr); }
.new-pl-box input:focus { border-color:var(--acc); }
.new-pl-btn { flex-shrink:0; padding:8px 16px; border-radius:var(--rad); background:var(--acc); color:#fff; font-size:12px; font-weight:500; transition:background var(--tr); }
.new-pl-btn:hover { background:var(--acc2); }

/* ═══════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════ */
#modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.7);
  z-index:100; display:none; align-items:flex-end; justify-content:center;
}
#modal-overlay.on { display:flex; }
#modal { background:var(--bg2); border-radius:16px 16px 0 0; padding:20px 20px 36px; width:100%; max-width:480px; border:1px solid var(--bdr); border-bottom:none; }
.modal-title { font-size:15px; font-weight:600; margin-bottom:14px; }
.modal-item  { display:flex; align-items:center; gap:12px; padding:10px 6px; border-radius:8px; cursor:pointer; transition:background var(--tr); font-size:13px; }
.modal-item:hover { background:var(--bg3); }
.modal-close { display:block; width:100%; margin-top:16px; padding:10px; border-radius:var(--rad); background:var(--bg3); color:var(--mut); font-size:13px; text-align:center; transition:background var(--tr); }
.modal-close:hover { background:var(--sur); }
.export-area { width:100%; min-height:120px; background:var(--bg3); border:1px solid var(--bdr); border-radius:8px; padding:10px; font-size:12px; font-family:monospace; color:var(--txt); resize:vertical; margin-bottom:10px; }
.export-copy { width:100%; padding:10px; border-radius:var(--rad); background:var(--acc); color:#fff; font-size:13px; font-weight:500; transition:background var(--tr); }
.export-copy:hover { background:var(--acc2); }

/* ═══════════════════════════════════════════════
   PLAYER
═══════════════════════════════════════════════ */
#player {
  background:var(--bg2); border-top:1px solid var(--bdr);
  display:grid; grid-template-columns:1fr auto 1fr;
  align-items:center; padding:0 12px; gap:6px; height:var(--ph);
}
.np        { display:flex; align-items:center; gap:8px; min-width:0; }
.np-art    { width:44px; height:44px; border-radius:6px; background:var(--sur); flex-shrink:0; overflow:hidden; position:relative; }
.np-art img{ width:100%; height:100%; object-fit:cover; display:none; position:absolute; inset:0; }
.np-ph     { width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
.np-info   { min-width:0; }
.np-title  { font-size:12px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.np-artist { font-size:11px; color:var(--mut); }
.np-like   { flex-shrink:0; padding:4px; color:var(--mut); transition:color var(--tr); }
.np-like.on{ color:var(--acc); }
.pctrl     { display:flex; flex-direction:column; align-items:center; gap:5px; }
.pbtns     { display:flex; align-items:center; gap:14px; }
.pbtn      { width:28px; height:28px; display:flex; align-items:center; justify-content:center; color:var(--mut); transition:color var(--tr); }
.pbtn:hover{ color:var(--txt); }
.pplay     { width:38px; height:38px; background:var(--acc); border-radius:50%; display:flex; align-items:center; justify-content:center; transition:background var(--tr); }
.pplay:hover{ background:var(--acc2); }
.prog      { display:flex; align-items:center; gap:6px; width:100%; }
.ptime     { font-size:10px; color:var(--mut); min-width:26px; }
.ptime.r   { text-align:right; }
.pbar      { flex:1; height:4px; background:var(--bdr); border-radius:2px; }
.pfill     { height:100%; background:var(--acc); border-radius:2px; width:0; }
.pright    { display:flex; align-items:center; justify-content:flex-end; gap:6px; }
.pvol      { display:flex; align-items:center; gap:5px; }
.pvolbar   { width:60px; height:4px; background:var(--bdr); border-radius:2px; cursor:pointer; }
.pvolfill  { height:100%; background:var(--mut); border-radius:2px; width:70%; }

/* ═══════════════════════════════════════════════
   YT PANEL
═══════════════════════════════════════════════ */
#ytp {
  position:fixed; top:60px; right:10px; width:285px;
  border-radius:10px; overflow:hidden;
  border:1px solid var(--bdr); box-shadow:0 8px 32px rgba(0,0,0,.6);
  display:none; z-index:50;
}
#ytp.on   { display:block; }
#ytdrag   { background:var(--bg3); padding:5px 10px; display:flex; align-items:center; justify-content:space-between; cursor:grab; touch-action:none; user-select:none; }
#ytdrag span { font-size:11px; color:var(--mut); }
#ytvid    { background:#000; }
#ychapters { max-height:160px; overflow-y:auto; background:var(--bg); border-top:1px solid var(--bdr); }
#ychapters:empty { display:none; }
.ychap    { display:flex; align-items:center; gap:10px; padding:7px 12px; cursor:pointer; transition:background var(--tr); font-size:12px; }
.ychap:hover { background:var(--bg2); }
.ychap.on { color:var(--acc2); background:var(--bg2); }
.ychap-time  { flex-shrink:0; font-size:11px; color:var(--acc); font-weight:600; min-width:38px; }
.ychap-title { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
#ytbar { background:var(--bg2); padding:7px 10px; display:flex; align-items:center; gap:8px; }
.ynp   { flex:1; min-width:0; }
.ynt   { font-size:12px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.yna   { font-size:11px; color:var(--mut); }
.yimg  { width:32px; height:32px; border-radius:4px; object-fit:cover; background:var(--sur); flex-shrink:0; display:none; }
.ybtns { display:flex; align-items:center; gap:6px; flex-shrink:0; }
.ybtn  { width:26px; height:26px; display:flex; align-items:center; justify-content:center; color:var(--mut); transition:color var(--tr); }
.ybtn:hover { color:var(--txt); }
.yplay { width:30px; height:30px; background:var(--acc); border-radius:50%; display:flex; align-items:center; justify-content:center; }
#btn-reco {
  width:100%; padding:7px 12px; text-align:left;
  background:var(--bg3); border-top:1px solid var(--bdr);
  font-size:12px; color:var(--mut);
  transition:background var(--tr),color var(--tr);
}
#btn-reco:hover { background:var(--sur); color:var(--txt); }
#btn-reco.on    { color:var(--acc2); }

/* ═══════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════ */
#toast {
  position:fixed; bottom:calc(var(--ph) + 12px); left:50%;
  transform:translateX(-50%) translateY(8px);
  background:var(--sur); border:1px solid var(--bdr);
  font-size:13px; padding:8px 16px; border-radius:20px;
  opacity:0; pointer-events:none;
  transition:opacity .25s,transform .25s;
  white-space:nowrap; z-index:200;
}
#toast.on { opacity:1; transform:translateX(-50%) translateY(0); }

/* ═══════════════════════════════════════════════
   EQ ANIMATION
═══════════════════════════════════════════════ */
.eq      { display:inline-flex; align-items:flex-end; gap:2px; height:14px; vertical-align:middle; margin-left:4px; }
.eq span { width:3px; background:var(--acc); border-radius:1px; animation:eq .7s ease-in-out infinite alternate; }
.eq span:nth-child(1) { height:40%;  animation-delay:0s; }
.eq span:nth-child(2) { height:100%; animation-delay:.15s; }
.eq span:nth-child(3) { height:60%;  animation-delay:.3s; }
.eq span:nth-child(4) { height:80%;  animation-delay:.1s; }
@keyframes eq { from { transform:scaleY(.25); } to { transform:scaleY(1); } }

::-webkit-scrollbar       { width:5px; }
::-webkit-scrollbar-thumb { background:var(--bdr); border-radius:3px; }

/* ═══════════════════════════════════════════════
   PANEL PAROLES (draggable)
═══════════════════════════════════════════════ */
#lyrics-panel {
  position:fixed; bottom:calc(var(--ph) + 10px); left:10px;
  width:300px; max-height:55vh;
  background:var(--bg2); border:1px solid var(--bdr);
  border-radius:12px; box-shadow:0 8px 32px rgba(0,0,0,.6);
  display:none; flex-direction:column; z-index:51; overflow:hidden;
}
#lyrics-panel.on { display:flex; }
#lyrics-drag {
  background:var(--bg3); padding:6px 12px;
  display:flex; align-items:center; justify-content:space-between;
  cursor:grab; touch-action:none; user-select:none; flex-shrink:0;
}
#lyrics-drag span { font-size:11px; color:var(--mut); }
#lyrics-title {
  padding:8px 14px 4px; font-size:12px; font-weight:600;
  color:var(--acc2); flex-shrink:0;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
#lyrics-body {
  overflow-y:auto; padding:4px 14px 14px;
  font-size:13px; line-height:1.7; color:var(--txt);
  white-space:pre-wrap; flex:1;
}
#lyrics-body.empty { color:var(--mut); font-style:italic; font-size:13px; }

</style>
</head>
<body>
<div id="app">
  <div id="main">

    <!-- TOPBAR -->
    <div id="topbar">
      <div class="sbox">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="sinput" type="text" placeholder="Rechercher un titre, un artiste&hellip;" onkeydown="onKey(event)"/>
      </div>
      <div class="avatar" id="avatar" onclick="toggleUser()" title="Changer d'utilisateur">S</div>
      <span class="ver">v18</span>
    </div>

    <!-- GENRES BAR -->
    <div id="gbar"></div>

    <!-- TABS -->
    <div id="tabs">
      <div class="tab on" onclick="showTab('home',this)">Accueil</div>
      <div class="tab"    onclick="showTab('search',this)">Recherche</div>
      <div class="tab"    onclick="showTab('favs',this)">Favoris</div>
      <div class="tab"    onclick="showTab('playlists',this)">Playlists</div>
    </div>

    <div id="content">

      <!-- ACCUEIL -->
      <div id="vhome">
        <p class="sec">Bonne &eacute;coute, <em id="username">Sandra</em></p>
        <div id="vhist"></div>
      </div>

      <!-- RECHERCHE -->
      <div id="vsearch" style="display:none">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:16px;margin-bottom:10px">
          <p class="sec" style="margin:0" id="stitle">Recherche</p>
          <span id="scount" style="font-size:12px;color:var(--mut)"></span>
        </div>
        <div id="sresults">
          <div class="loading">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            Tapez votre recherche
          </div>
        </div>
      </div>

      <!-- FAVORIS -->
      <div id="vfavs" style="display:none">
        <p class="sec">Titres <em>aim&eacute;s</em></p>
        <div id="flist"></div>
      </div>

      <!-- PLAYLISTS -->
      <div id="vplaylists" style="display:none">
        <p class="sec">Mes <em>Playlists</em></p>

        <div class="new-pl-box">
          <input id="pl-name-input" type="text" placeholder="Nom de la nouvelle playlist&hellip;" onkeydown="onPlKey(event)"/>
          <button class="new-pl-btn" onclick="createPlaylist()">Cr&eacute;er</button>
        </div>

        <div class="imp-box">
          <input id="pl-yt-url" type="text" placeholder="URL playlist YouTube (youtube.com ou music.youtube.com)&hellip;"/>
          <button class="imp-btn" onclick="importYTPlaylist()">Importer</button>
        </div>

        <div style="margin-bottom:12px">
          <textarea id="pl-urls-raw" placeholder="Ou coller une liste d'URLs YouTube (une par ligne)&#10;https://www.youtube.com/watch?v=xxx&#10;https://www.youtube.com/watch?v=yyy" style="width:100%;min-height:80px;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--rad);padding:10px 12px;font-size:12px;font-family:monospace;color:var(--txt);resize:vertical;transition:border-color var(--tr)" onfocus="this.style.borderColor='var(--acc)'" onblur="this.style.borderColor='var(--bdr)'"></textarea>
          <button class="imp-btn" style="margin-top:6px;width:100%" onclick="importRawUrls()">Importer la liste d'URLs</button>
        </div>

        <div id="pl-list"></div>

        <div id="pl-detail" style="display:none">
          <div style="display:flex;align-items:center;gap:10px;margin-top:20px;margin-bottom:10px">
            <button onclick="closePlDetail()" style="color:var(--mut);font-size:22px;line-height:1;padding:0">&larr;</button>
            <p class="sec" style="margin:0;flex:1" id="pl-detail-name"></p>
            <button onclick="exportPlaylist()" style="font-size:11px;padding:5px 12px;border-radius:16px;background:var(--bg2);border:1px solid var(--bdr);color:var(--mut)">Export</button>
          </div>
          <div id="pl-detail-list"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- PLAYER -->
  <div id="player">
    <div class="np">
      <div class="np-art">
        <div class="np-ph" id="npph">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--mut)" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        </div>
        <img id="npimg" src="" alt=""/>
      </div>
      <div class="np-info">
        <div class="np-title"  id="nptitle">&mdash; Aucun titre &mdash;</div>
        <div class="np-artist" id="npartist">Sonate</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// BLOC 1 — CONFIG
// ═══════════════════════════════════════════════════════════════════
var KEY = 'AIzaSyAGo-7ERB8T7jr0xzIBsFDWjN5fNQbjAMQ';
var GENRES = [
  {n:'Power Metal',  q:'power metal official music video', ic:'⚔️'},
  {n:'Symphonic',    q:'symphonic metal official',         ic:'🎻'},
  {n:'Epique',       q:'epic orchestral metal music',      ic:'🏰'},
  {n:'Viking Metal', q:'viking metal folk official',       ic:'🪖'},
  {n:'Folk Metal',   q:'folk metal official music video',  ic:'🪕'},
  {n:'Heavy Metal',  q:'heavy metal classic official',     ic:'🤘'}
];

// ═══════════════════════════════════════════════════════════════════
// BLOC 2 — ETAT GLOBAL
// ═══════════════════════════════════════════════════════════════════
var tracks = { search:[], hist:[], favs:[], reco:[], pl:[] };
var cur          = null;
var curSrc       = '';
var curIdx       = -1;
var playing      = false;
var shuffle      = false;
var repeat       = false;
var muted        = false;
var vol          = 70;
var vidHide      = false;
var currentVid   = '';
var currentStart = 0;
var lastRecoVid  = '';
var recoVisible  = false;
var liked        = {};
var favd         = {};
var pls          = [];
var theme        = 'dark';
var openPlId     = null;
var pendingTrack = null;
var currentUser  = 'Sandra'; // 'Sandra' ou 'Johan'

// ═══════════════════════════════════════════════════════════════════
// BLOC 3 — INIT
// ═══════════════════════════════════════════════════════════════════
function init() {
  try { liked       = JSON.parse(localStorage.getItem('snt_liked') || '{}'); } catch(e) { liked = {}; }
  try { favd        = JSON.parse(localStorage.getItem('snt_favd')  || '{}'); } catch(e) { favd  = {}; }
  try { tracks.hist = JSON.parse(localStorage.getItem('snt_hist')  || '[]'); } catch(e) { tracks.hist = []; }
  try { pls         = JSON.parse(localStorage.getItem('snt_pls')   || '[]'); } catch(e) { pls   = []; }
  theme = localStorage.getItem('snt_theme') || 'dark';
  currentUser = localStorage.getItem('snt_user') || 'Sandra';
  applyTheme(theme);
  applyUser();
  renderGbar();
  renderHist();
  renderFavs();
  renderPlaylists();
  initDrag();
  initLyricsDrag();
}
document.addEventListener('DOMContentLoaded', init);

// ═══════════════════════════════════════════════════════════════════
// BLOC 4 — NAVIGATION
// ═══════════════════════════════════════════════════════════════════
var TAB_MAP = {home:'vhome', search:'vsearch', favs:'vfavs', playlists:'vplaylists'};

function showTab(name, el) {
  var keys = Object.keys(TAB_MAP);
  for (var i = 0; i < keys.length; i++) {
    document.getElementById(TAB_MAP[keys[i]]).style.display = keys[i] === name ? '' : 'none';
  }
  var tabs = document.querySelectorAll('.tab');
  for (var j = 0; j < tabs.length; j++) { tabs[j].classList.remove('on'); }
  if (el) { el.classList.add('on'); }
  if (name === 'favs')      { renderFavs(); }
  if (name === 'playlists') { renderPlaylists(); }
}

// ═══════════════════════════════════════════════════════════════════
// BLOC 5 — GENRES BAR
// ═══════════════════════════════════════════════════════════════════
function renderGbar() {
  var html = '';
  for (var i = 0; i < GENRES.length; i++) {
    html += '<button class="gbtn" onclick="searchGenre(' + i + ')">'
      + GENRES[i].ic + ' ' + GENRES[i].n + '</button>';
  }
  document.getElementById('gbar').innerHTML = html;
}

function searchGenre(i) {
  document.getElementById('sinput').value = GENRES[i].q;
  showTab('search', document.querySelector('.tab:nth-child(2)'));
  doSearch(GENRES[i].q);
}

// ═══════════════════════════════════════════════════════════════════
// BLOC 6 — RECHERCHE (100 unites/appel)
// ═══════════════════════════════════════════════════════════════════
function onKey(e) {
  if (e.key !== 'Enter') { return; }
  var q = e.target.value.trim();
  if (!q) { return; }
  showTab('search', document.querySelector('.tab:nth-child(2)'));
  doSearch(q);
}

function doSearch(q) {
  document.getElementById('stitle').textContent = '"' + q + '"';
  document.getElementById('scount').textContent = '';
  document.getElementById('sresults').innerHTML = '<div class="loading"><div class="spin"></div>Recherche...</div>';
  var url = 'https://www.googleapis.com/youtube/v3/search'
    + '?part=snippet&type=video&videoCategoryId=10&maxResults=15'
    + '&q=' + encodeURIComponent(q) + '&key=' + KEY;
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.error) {
        document.getElementById('sresults').innerHTML = '<div class="loading">' + esc(d.error.message) + '</div>';
        return;
      }
      tracks.search = [];
      var items = d.items || [];
      for (var i = 0; i < items.length; i++) {
        var sn = items[i].snippet;
        var th = sn.thumbnails && sn.thumbnails.medium ? sn.thumbnails.medium.url : '';
        tracks.search.push({id:items[i].id.videoId, title:sn.title, artist:sn.channelTitle, thumb:th});
      }
      document.getElementById('scount').textContent = tracks.search.length + ' resultats';
      document.getElementById('sresults').innerHTML = renderList('search');
    })
    .catch(function() {
      document.getElementById('sresults').innerHTML = '<div class="loading">Erreur reseau</div>';
    });
}

// ═══════════════════════════════════════════════════════════════════
// BLOC 7 — RENDU LISTES
// ═══════════════════════════════════════════════════════════════════
function renderList(src) {
  var arr = tracks[src];
  if (!arr || !arr.length) {
    return '<p style="color:var(--mut);font-size:14px;padding:8px 0">Aucun titre.</p>';
  }
  var html = '<div class="tlist">';
  for (var i = 0; i < arr.length; i++) { html += rowHTML(src, i); }
  html += '</div>';
  return html;
}

function rowHTML(src, i) {
  var t       = tracks[src][i];
  var isOn    = cur && cur.id === t.id;
  var isLiked = !!liked[t.id];
  var eq      = isOn && playing
    ? '<div class="eq"><span></span><span></span><span></span><span></span></div>'
    : '';
  return '<div class="trow' + (isOn ? ' on' : '') + '" onclick="play(\'' + src + '\',' + i + ')">'
    + '<img class="tthumb" src="' + esc(t.thumb) + '" onerror="this.style.visibility=\'hidden\'"/>'
    + '<div class="tinfo">'
    +   '<div class="tname">' + esc(t.title) + eq + '</div>'
    +   '<div class="tartist">' + esc(t.artist) + '</div>'
    + '</div>'
    + '<div class="tactions">'
    +   '<button class="tlike' + (isLiked ? ' on' : '') + '" onclick="event.stopPropagation();like(\''
          + esc2(t.id) + '\',\'' + esc2(t.title) + '\',\'' + esc2(t.artist) + '\',\'' + esc2(t.thumb) + '\')">'
    +     '<svg width="14" height="14" viewBox="0 0 24 24"'
    +     ' fill="' + (isLiked ? 'currentColor' : 'none') + '" stroke="currentColor" stroke-width="2.5">'
    +     '<path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>'
    +   '</button>'
    +   '<button class="tadd" onclick="event.stopPropagation();openAddToPlaylist(\'' + src + '\',' + i + ')">'
    +     '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">'
    +     '<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>'
    +   '</button>'
    + '</div>'
    + '</div>';
}

function renderHist() {
  var w = document.getElementById('vhist');
  if (!tracks.hist.length) {
    w.innerHTML = '<p style="color:var(--mut);font-size:14px;padding:4px 0">Cliquez sur un genre ou lancez une recherche.</p>';
    return;
  }
  w.innerHTML = renderList('hist');
}

function renderFavs() {
  var keys = Object.keys(liked);
  tracks.favs = [];
  for (var i = 0; i < keys.length; i++) {
    if (favd[keys[i]]) { tracks.favs.push(favd[keys[i]]); }
  }
  var w = document.getElementById('flist');
  w.innerHTML = tracks.favs.length
    ? renderList('favs')
    : '<p style="color:var(--mut);font-size:14px;padding:4px 0">Aucun favori.</p>';
}

function refreshAll() {
  renderHist();
  renderFavs();
  var sr = document.getElementById('sresults');
  if (sr && sr.querySelector('.tlist') && tracks.search.length) {
    sr.innerHTML = renderList('search');
  }
  if (openPlId !== null) { renderPlDetail(openPlId); }
}

// ═══════════════════════════════════════════════════════════════════
// BLOC 8 — LECTURE
// ═══════════════════════════════════════════════════════════════════
function play(src, i) {
  var t = tracks[src] && tracks[src][i];
  if (!t) { console.warn('play: introuvable', src, i); return; }
  curSrc       = src;
  curIdx       = i;
  cur          = t;
  playing      = true;
  currentStart = 0;
  loadEmbed(t.id, true, 0);
  updNP(t);
  addHist(t);
  refreshAll();
  if (lyricsVisible) { fetchLyrics(t); }
  toast('▶ ' + t.title);
}

function togglePlay() {
  if (!cur) { toast('Selectionnez un titre'); return; }
  playing = !playing;
  loadEmbed(cur.id, playing, currentStart);
  updPlayIco();
}

function prevT() {
  if (!curSrc || curIdx <= 0) { return; }
  play(curSrc, curIdx - 1);
}

function nextT() {
  if (!curSrc) { return; }
  var arr = tracks[curSrc];
  if (!arr || !arr.length) { return; }
  var n;
  if (shuffle)     { n = Math.floor(Math.random() * arr.length); }
  else if (repeat) { n = curIdx; }
  else             { n = (curIdx + 1) % arr.length; }
  play(curSrc, n);
}

function toggleShuffle() {
  shuffle = !shuffle;
  document.getElementById('bshuffle').style.color = shuffle ? 'var(--acc)' : '';
  toast(shuffle ? 'Aleatoire ON' : 'Aleatoire OFF');
}

function toggleRepeat() {
  repeat = !repeat;
  document.getElementById('brepeat').style.color = repeat ? 'var(--acc)' : '';
  toast(repeat ? 'Repetition ON' : 'Repetition OFF');
}

// ═══════════════════════════════════════════════════════════════════
// BLOC 9 — HISTORIQUE
// ═══════════════════════════════════════════════════════════════════
function addHist(t) {
  var filtered = [];
  for (var i = 0; i < tracks.hist.length; i++) {
    if (tracks.hist[i].id !== t.id) { filtered.push(tracks.hist[i]); }
  }
  tracks.hist = [t].concat(filtered).slice(0, 20);
  try { localStorage.setItem('snt_hist', JSON.stringify(tracks.hist)); } catch(e) {}
}

// ═══════════════════════════════════════════════════════════════════
// BLOC 10 — FAVORIS
// ═══════════════════════════════════════════════════════════════════
function like(id, title, artist, thumb) {
  if (liked[id]) {
    delete liked[id];
    delete favd[id];
    toast('Retire des favoris');
  } else {
    liked[id] = true;
    favd[id]  = {id:id, title:title, artist:artist, thumb:thumb};
    try { localStorage.setItem('snt_favd', JSON.stringify(favd)); } catch(e) {}
    toast('Ajoute aux favoris');
  }
  try { localStorage.setItem('snt_liked', JSON.stringify(liked)); } catch(e) {}
  refreshAll();
  updLikeBtn();
}

function toggleLike() {
  if (!cur) { return; }
  like(cur.id, cur.title, cur.artist, cur.thumb || '');
}

// ═══════════════════════════════════════════════════════════════════
// BLOC 11 — EMBED + CHAPITRES (1 unite/track)
// ═══════════════════════════════════════════════════════════════════
function loadEmbed(vid, autoplay, start) {
  var c = document.getElementById('ytvid');
  currentVid = vid;
  if (typeof start === 'number') { currentStart = start; }
  if (!autoplay) {
    c.innerHTML = '';
    document.getElementById('ytp').classList.add('on');
    return;
  }
  var src = 'https://www.youtube.com/embed/' + vid
    + '?autoplay=1&rel=0&modestbranding=1&start=' + currentStart;
  c.innerHTML = '<iframe src="' + src + '" width="100%" height="185" frameborder="0"'
    + ' allow="autoplay;encrypted-media" allowfullscreen style="display:block"></iframe>';
  document.getElementById('ytp').classList.add('on');
  fetchChapters(vid);
}

function fetchChapters(vid) {
  document.getElementById('ychapters').innerHTML = '';
  var url = 'https://www.googleapis.com/youtube/v3/videos?part=snippet&id=' + vid + '&key=' + KEY;
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (!d.items || !d.items[0]) { return; }
      var chapters = parseChapters(d.items[0].snippet.description || '');
      if (chapters.length >= 2) { renderChapters(vid, chapters); }
    })
    .catch(function() {});
}

function parseChapters(desc) {
  var re       = /(?:^|\s)(\d{1,2}:\d{2}(?::\d{2})?)\s+(.+)/gm;
  var chapters = [];
  var m;
  while ((m = re.exec(desc)) !== null) {
    var parts = m[1].split(':');
    var secs  = 0;
    if (parts.length === 3) {
      secs = parseInt(parts[0],10) * 3600 + parseInt(parts[1],10) * 60 + parseInt(parts[2],10);
    } else {
      secs = parseInt(parts[0],10) * 60 + parseInt(parts[1],10);
    }
    chapters.push({secs:secs, time:m[1], title:m[2].trim().replace(/^\d+[.)]\s*/,'')});
  }
  return chapters;
}

function renderChapters(vid, chapters) {
  var html = '';
  for (var i = 0; i < chapters.length; i++) {
    var ch   = chapters[i];
    var isOn = ch.secs === currentStart;
    html += '<div class="ychap' + (isOn ? ' on' : '') + '" onclick="playChapter(\''
      + esc2(vid) + '\',' + ch.secs + ',' + i + ')">'
      + '<span class="ychap-time">'  + esc(ch.time)  + '</span>'
      + '<span class="ychap-title">' + esc(ch.title) + '</span>'
      + '</div>';
  }
  document.getElementById('ychapters').innerHTML = html;
}

function playChapter(vid, secs, idx) {
  currentStart = secs;
  var chaps = document.querySelectorAll('.ychap');
  for (var i = 0; i < chaps.length; i++) { chaps[i].classList.toggle('on', i === idx); }
  var src = 'https://www.youtube.com/embed/' + vid
    + '?autoplay=1&rel=0&modestbranding=1&start=' + secs;
  document.getElementById('ytvid').innerHTML = '<iframe src="' + src
    + '" width="100%" height="185" frameborder="0"'
    + ' allow="autoplay;encrypted-media" allowfullscreen style="display:block"></iframe>';
  playing = true;
  updPlayIco();
}

// ═══════════════════════════════════════════════════════════════════
// BLOC 12 — RECOS (bouton flottant, 100 unites/clic)
// ═══════════════════════════════════════════════════════════════════
function toggleReco() {
  if (!cur) { toast('Lancez d\'abord un titre'); return; }
  if (recoVisible) {
    recoVisible = false;
    document.getElementById('vreco').style.display    = 'none';
    document.getElementById('btn-reco').textContent   = '🎵 Afficher les similaires';
    document.getElementById('btn-reco').classList.remove('on');
    return;
  }
  recoVisible = true;
  document.getElementById('btn-reco').textContent = 'X Masquer les similaires';
  document.getElementById('btn-reco').classList.add('on');
  if (lastRecoVid === cur.id && tracks.reco.length) {
    document.getElementById('vreco').style.display = '';
    return;
  }
  loadReco(cur.id);
}

function loadReco(vid) {
  lastRecoVid = vid;
  var url = 'https://www.googleapis.com/youtube/v3/search'
    + '?part=snippet&type=video&relatedToVideoId=' + vid
    + '&videoCategoryId=10&maxResults=8&key=' + KEY;
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (!d.items) { return; }
      tracks.reco = [];
      for (var i = 0; i < d.items.length; i++) {
        var it = d.items[i];
        if (!it.id || !it.id.videoId || it.id.videoId === vid) { continue; }
        var sn = it.snippet;
        var th = sn.thumbnails && sn.thumbnails.medium ? sn.thumbnails.medium.url : '';
        tracks.reco.push({id:it.id.videoId, title:sn.title, artist:sn.channelTitle, thumb:th});
      }
      if (!tracks.reco.length) { toast('Aucun similaire trouve'); return; }
      var html = '';
      for (var j = 0; j < tracks.reco.length; j++) {
        var t = tracks.reco[j];
        html += '<div class="rcard" onclick="play(\'reco\',' + j + ')">'
          + '<img class="rthumb" src="' + esc(t.thumb) + '" onerror="this.style.opacity=.3"/>'
          + '<div class="rtitle">' + esc(t.title)  + '</div>'
          + '<div class="rsub">'   + esc(t.artist) + '</div>'
          + '</div>';
      }
      document.getElementById('rlist').innerHTML = html;
      document.getElementById('vreco').style.display = '';
    })
    .catch(function() { toast('Erreur similaires'); });
}

function savePls() {
  try { localStorage.setItem('snt_pls', JSON.stringify(pls)); } catch(e) {}
}

function getPlById(id) {
  for (var i = 0; i < pls.length; i++) {
    if (pls[i].id === id) { return pls[i]; }
  }
  return null;
}

function onPlKey(e) {
  if (e.key === 'Enter') { createPlaylist(); }
}

function createPlaylist() {
  var input = document.getElementById('pl-name-input');
  var name  = input.value.trim();
  if (!name) { toast('Donnez un nom a la playlist'); return; }
  pls.unshift({id:'pl_' + Date.now(), name:name, tracks:[]});
  savePls();
  input.value = '';
  renderPlaylists();
  toast('Playlist creee');
}

function deletePlaylist(id) {
  var newPls = [];
  for (var i = 0; i < pls.length; i++) {
    if (pls[i].id !== id) { newPls.push(pls[i]); }
  }
  pls = newPls;
  savePls();
  if (openPlId === id) { closePlDetail(); }
  renderPlaylists();
  toast('Playlist supprimee');
}

function renamePl(id) {
  var pl = getPlById(id);
  if (!pl) { return; }
  var name = prompt('Renommer la playlist :', pl.name);
  if (name && name.trim()) {
    pl.name = name.trim();
    savePls();
    renderPlaylists();
    if (openPlId === id) { document.getElementById('pl-detail-name').textContent = pl.name; }
    toast('Playlist renommee');
  }
}

function openAddToPlaylist(src, i) {
  var t = tracks[src] && tracks[src][i];
  if (!t) { return; }
  pendingTrack = t;
  if (!pls.length) { toast('Creez d\'abord une playlist'); return; }
  var html = '';
  for (var j = 0; j < pls.length; j++) {
    var pl = pls[j];
    html += '<div class="modal-item" onclick="addToPl(\'' + esc2(pl.id) + '\')">'
      + '<span style="font-size:20px">&#127925;</span>'
      + '<span>' + esc(pl.name) + ' <span style="color:var(--mut);font-size:11px">(' + pl.tracks.length + ' titres)</span></span>'
      + '</div>';
  }
  document.getElementById('modal-title').textContent = 'Ajouter a une playlist';
  document.getElementById('modal-body').innerHTML    = html;
  document.getElementById('modal-overlay').classList.add('on');
}

function addToPl(plId) {
  var pl = getPlById(plId);
  if (!pl || !pendingTrack) { closeModal(); return; }
  for (var i = 0; i < pl.tracks.length; i++) {
    if (pl.tracks[i].id === pendingTrack.id) {
      toast('Deja dans "' + pl.name + '"');
      closeModal();
      return;
    }
  }
  pl.tracks.push(pendingTrack);
  savePls();
  closeModal();
  toast('Ajoute a "' + pl.name + '"');
  if (openPlId === plId) { renderPlDetail(plId); }
}

function removeFromPl(plId, trackIdx) {
  var pl = getPlById(plId);
  if (!pl) { return; }
  pl.tracks.splice(trackIdx, 1);
  savePls();
  renderPlDetail(plId);
  toast('Titre retire');
}

/* Import YouTube — 1 unite / 50 titres */
function importYTPlaylist() {
  var urlVal = document.getElementById('pl-yt-url').value.trim();
  if (!urlVal) { toast('Collez l\'URL de la playlist YouTube'); return; }
  // Accepte youtube.com, m.youtube.com, music.youtube.com
  var m = urlVal.match(/[?&]list=([^&\s]+)/);
  if (!m) { toast('URL invalide — doit contenir ?list=...'); return; }
  var plId = m[1];
  // Les playlists auto YouTube Music (RDAMPL, RDCLAK...) ne sont pas accessibles via l'API
  if (/^(RDAMPL|RDCLAK|RDTMAK|RD|OL)/.test(plId)) {
    toast('Playlist auto YouTube Music — non accessible via l\'API. Utilisez une playlist personnelle.');
    return;
  }
  toast('Import en cours...');
  fetchYTPlaylistPage(plId, null, []);
}

function fetchYTPlaylistPage(ytPlId, pageToken, acc) {
  var url = 'https://www.googleapis.com/youtube/v3/playlistItems'
    + '?part=snippet&maxResults=50&playlistId=' + encodeURIComponent(ytPlId)
    + '&key=' + KEY
    + (pageToken ? '&pageToken=' + encodeURIComponent(pageToken) : '');
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.error) {
        var code = d.error.code;
        var msg  = d.error.message || '';
        if (code === 404 || msg.indexOf('playlistId') !== -1) {
          toast('Playlist introuvable — verifiez qu\'elle est publique ou non-listee');
        } else if (code === 403) {
          toast('Acces refuse — playlist privee ou quota depasse');
        } else {
          toast('Erreur API ' + code + ' : ' + msg.substring(0, 50));
        }
        return;
      }
      var items = d.items || [];
      for (var i = 0; i < items.length; i++) {
        var sn    = items[i].snippet;
        var vidId = sn.resourceId && sn.resourceId.videoId;
        if (!vidId || sn.title === 'Deleted video' || sn.title === 'Private video') { continue; }
        var th = sn.thumbnails && sn.thumbnails.medium ? sn.thumbnails.medium.url : '';
        acc.push({id:vidId, title:sn.title, artist:sn.videoOwnerChannelTitle || '', thumb:th});
      }
      if (d.nextPageToken && acc.length < 500) {
        fetchYTPlaylistPage(ytPlId, d.nextPageToken, acc);
      } else {
        finalizeImport(acc, 'pl_yt_');
      }
    })
    .catch(function() { toast('Erreur reseau import'); });
}

function finalizeImport(items, prefix) {
  if (!items.length) { toast('Aucun titre importe — playlist vide ou tous prives'); return; }
  var pfx = prefix || 'pl_yt_';
  pls.unshift({
    id:     pfx + Date.now(),
    name:   'Import YT ' + new Date().toLocaleDateString('fr-FR'),
    tracks: items
  });
  savePls();
  document.getElementById('pl-yt-url').value = '';
  renderPlaylists();
  toast(items.length + ' titres importes');
}

// Import liste d'URLs brutes (une URL YouTube par ligne)
function importRawUrls() {
  var raw = document.getElementById('pl-urls-raw').value.trim();
  if (!raw) { toast('Collez des URLs YouTube dans la zone de texte'); return; }
  var lines = raw.split('\n');
  var items = [];
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();
    if (!line) { continue; }
    var vid  = null;
    var m1   = line.match(/(?:watch\?v=|youtu\.be\/)([A-Za-z0-9_-]{11})/);
    if (m1) { vid = m1[1]; }
    if (!vid) { continue; }
    items.push({
      id:     vid,
      title:  'Titre ' + (items.length + 1),
      artist: '',
      thumb:  'https://i.ytimg.com/vi/' + vid + '/mqdefault.jpg'
    });
  }
  if (!items.length) { toast('Aucune URL YouTube valide trouvee'); return; }
  pls.unshift({
    id:     'pl_raw_' + Date.now(),
    name:   'Import URLs ' + new Date().toLocaleDateString('fr-FR'),
    tracks: items
  });
  savePls();
  document.getElementById('pl-urls-raw').value = '';
  renderPlaylists();
  toast(items.length + ' titres importes');
}

    return;
  }

      +   '<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>'
      +   '<path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>'
      + '</button>'
      + '</div>';
  }
  w.innerHTML = html;
  document.getElementById('pl-list').style.display = '';
  // Appui long tactile pour renommer
  var rows = w.querySelectorAll('.pl-row');
  for (var k = 0; k < rows.length; k++) {

// BLOC 20 — PAROLES (LRCLIB, 0 unite API, cache localStorage 7j)
// ═══════════════════════════════════════════════════════════════════
var lyricsVisible = false;
var LYRICS_TTL    = 7 * 24 * 3600 * 1000; // 7 jours en ms

function toggleLyrics() {
  if (!lyricsVisible) {
    document.getElementById('lyrics-panel').classList.add('on');
    document.getElementById('blyrics').style.color = 'var(--acc)';
    lyricsVisible = true;
    if (cur) { fetchLyrics(cur); }
  } else {
    closeLyrics();
  }
}

function closeLyrics() {
  document.getElementById('lyrics-panel').classList.remove('on');
  document.getElementById('blyrics').style.color = '';
  lyricsVisible = false;
}

function fetchLyrics(t) {
  var body  = document.getElementById('lyrics-body');
  var title = document.getElementById('lyrics-title');
  title.textContent = t.title;
  body.className    = 'empty';
  body.textContent  = 'Recherche des paroles...';

  // Verifier le cache localStorage
  var cacheKey = 'snt_lyr_' + t.id;
  try {
    var cached = localStorage.getItem(cacheKey);
    if (cached) {
      var obj = JSON.parse(cached);
      if (Date.now() - obj.ts < LYRICS_TTL) {
        displayLyrics(obj.lyrics, obj.found);
        return;
      }
      localStorage.removeItem(cacheKey);
    }
  } catch(e) {}

  // Nettoyer le titre pour la recherche (enlever feat., parentheses, etc.)
  var cleanTitle  = t.title.replace(/\s*[\(\[].*?[\)\]]/g, '').replace(/\s*feat\..*$/i, '').trim();
  var cleanArtist = t.artist.replace(/\s*-\s*Topic$/i, '').trim();

  var url = 'https://lrclib.net/api/search?track_name='
    + encodeURIComponent(cleanTitle)
    + '&artist_name=' + encodeURIComponent(cleanArtist);

  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (!d || !d.length) {
        cacheLyrics(cacheKey, 'Paroles non trouvees pour ce titre.', false);
        displayLyrics('Paroles non trouvees pour ce titre.', false);
        return;
      }
      // Prendre le premier resultat avec paroles plain text
      var best = null;
      for (var i = 0; i < d.length; i++) {
        if (d[i].plainLyrics) { best = d[i]; break; }
      }
      if (!best) {
        cacheLyrics(cacheKey, 'Paroles non trouvees pour ce titre.', false);
        displayLyrics('Paroles non trouvees pour ce titre.', false);
        return;
      }
      cacheLyrics(cacheKey, best.plainLyrics, true);
      displayLyrics(best.plainLyrics, true);
    })
    .catch(function() {
      body.className   = 'empty';
      body.textContent = 'Erreur reseau — paroles indisponibles.';
    });
}

function cacheLyrics(key, lyrics, found) {
  try {
    localStorage.setItem(key, JSON.stringify({lyrics:lyrics, found:found, ts:Date.now()}));
  } catch(e) {}
}

function displayLyrics(text, found) {
  var body = document.getElementById('lyrics-body');
  if (!found) {
    body.className   = 'empty';
    body.textContent = text;
  } else {
    body.className   = '';
    body.textContent = text;
    body.scrollTop   = 0;
  }
}

function initLyricsDrag() {
  var panel  = document.getElementById('lyrics-panel');
  var handle = document.getElementById('lyrics-drag');
  var sx, sy, ox, oy;
  function start(e) {
    var touch = e.touches ? e.touches[0] : e;
    sx = touch.clientX; sy = touch.clientY;
    var r = panel.getBoundingClientRect();
    ox = r.left; oy = r.top;
    panel.style.bottom = 'auto';
    panel.style.left   = ox + 'px';
    panel.style.top    = oy + 'px';
    document.addEventListener('mousemove', move);
    document.addEventListener('touchmove', move, {passive:false});
    document.addEventListener('mouseup',   stop);
    document.addEventListener('touchend',  stop);
  }
  function move(e) {
    if (e.cancelable) { e.preventDefault(); }
    var touch = e.touches ? e.touches[0] : e;
    var nl = Math.max(0, Math.min(window.innerWidth  - panel.offsetWidth,  ox + touch.clientX - sx));
    var nt = Math.max(0, Math.min(window.innerHeight - panel.offsetHeight, oy + touch.clientY - sy));
    panel.style.left = nl + 'px';
    panel.style.top  = nt + 'px';
  }
  function stop() {
    document.removeEventListener('mousemove', move);
    document.removeEventListener('touchmove', move);
    document.removeEventListener('mouseup',   stop);
    document.removeEventListener('touchend',  stop);
  }
  handle.addEventListener('mousedown',  start);
  handle.addEventListener('touchstart', start, {passive:true});
}

    panel.style.left = nl + 'px';
    panel.style.top  = nt + 'px';
  }
  function stop() {
    document.removeEventListener('mousemove', move);
    document.removeEventListener('touchmove', move);
    document.removeEventListener('mouseup',   stop);
    document.removeEventListener('touchend',  stop);
  }
  handle.addEventListener('mousedown',  start);
  handle.addEventListener('touchstart', start, {passive:true});
}

// ═══════════════════════════════════════════════════════════════════
// BLOC 18 — THEME
// ═══════════════════════════════════════════════════════════════════
function toggleTheme() {
  theme = theme === 'dark' ? 'light' : 'dark';
  applyTheme(theme);
  try { localStorage.setItem('snt_theme', theme); } catch(e) {}
}
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
}

function toggleUser() {
  currentUser = currentUser === 'Sandra' ? 'Johan' : 'Sandra';
  try { localStorage.setItem('snt_user', currentUser); } catch(e) {}
  applyUser();
  toast('Bonjour ' + currentUser + ' !');
}
function applyUser() {
  document.getElementById('avatar').textContent   = currentUser.charAt(0);
  document.getElementById('username').textContent = currentUser;
}

// ═══════════════════════════════════════════════════════════════════
// BLOC 19 — UTILS
// ═══════════════════════════════════════════════════════════════════
function esc(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function esc2(s) {
  return String(s || '').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
}
var _toastTimer;
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('on');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function() { el.classList.remove('on'); }, 2400);
}
</script>
