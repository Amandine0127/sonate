<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sonate</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0e0d0d;--bg2:#181616;--bg3:#221f1f;--sur:#2a2626;--bdr:#332e2e;--acc:#c8954a;--acc2:#e8b97a;--txt:#f0ece6;--mut:#7a7270;--ph:88px;--rad:10px;--tr:0.2s ease}
[data-theme=light]{--bg:#f5f2ee;--bg2:#ede9e3;--bg3:#e2dcd5;--sur:#d8d1c8;--bdr:#c8bfb4;--acc:#a0682a;--acc2:#c88840;--txt:#1a1614;--mut:#7a6e66}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);overflow:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:inherit;outline:none;border:none;background:none;color:inherit}

/* Layout */
#app{display:grid;grid-template-rows:1fr var(--ph);height:100vh}
#main{overflow-y:auto;display:flex;flex-direction:column;min-height:0}

/* Topbar */
#topbar{position:sticky;top:0;z-index:10;background:linear-gradient(to bottom,var(--bg) 70%,transparent);padding:16px 20px 10px;display:flex;align-items:center;gap:12px}
.search-box{flex:1;display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--bdr);border-radius:30px;padding:9px 16px;transition:border-color var(--tr)}
.search-box:focus-within{border-color:var(--acc)}
.search-box input{flex:1;font-size:14px}
.search-box input::placeholder{color:var(--mut)}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff;flex-shrink:0}
.ver{font-size:10px;color:var(--mut)}

/* Content */
#content{padding:0 20px 100px;flex:1}
.sec{font-size:20px;font-weight:600;margin:24px 0 12px}
.sec em{font-style:italic;color:var(--acc2);font-family:'Playfair Display',serif}

/* Cards genres */
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--rad);padding:10px;cursor:pointer;transition:background var(--tr),border-color var(--tr)}
.card:hover{background:var(--bg3);border-color:var(--acc)}
.card-img{width:100%;aspect-ratio:1;border-radius:6px;overflow:hidden;position:relative;background:var(--sur);margin-bottom:8px}
.card-icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:28px}
.card-cover{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none}
.card-name{font-size:12px;font-weight:500}
.card-sub{font-size:11px;color:var(--mut);margin-top:2px}

/* Tracklist */
.tlist{display:flex;flex-direction:column;gap:2px}
.trow{display:grid;grid-template-columns:40px 1fr 32px;align-items:center;gap:10px;padding:7px 6px;border-radius:8px;cursor:pointer;transition:background var(--tr)}
.trow:hover{background:var(--bg2)}
.trow.on{color:var(--acc2)}
.tthumb{width:40px;height:40px;border-radius:4px;object-fit:cover;background:var(--sur)}
.tinfo .tname{font-size:13px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tinfo .tartist{font-size:11px;color:var(--mut);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tlike{display:flex;align-items:center;justify-content:center;color:var(--mut);opacity:0;transition:color var(--tr),opacity var(--tr)}
.trow:hover .tlike,.tlike.on{opacity:1}
.tlike.on{color:var(--acc)}

/* Loading */
.loading{display:flex;flex-direction:column;align-items:center;gap:14px;padding:50px 0;color:var(--mut);font-size:14px}
.spin{width:28px;height:28px;border:3px solid var(--bdr);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Recos */
.reco-list{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px}
.reco-list::-webkit-scrollbar{height:3px}
.reco-list::-webkit-scrollbar-thumb{background:var(--bdr)}
.rcard{flex-shrink:0;width:120px;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--rad);padding:8px;cursor:pointer;transition:background var(--tr)}
.rcard:hover{background:var(--bg3)}
.rthumb{width:100%;aspect-ratio:1;border-radius:5px;object-fit:cover;background:var(--sur);display:block;margin-bottom:6px}
.rtitle{font-size:11px;font-weight:500;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rsub{font-size:10px;color:var(--mut);margin-top:2px}

/* Player */
#player{background:var(--bg2);border-top:1px solid var(--bdr);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 14px;gap:8px;height:var(--ph)}
.np{display:flex;align-items:center;gap:10px;min-width:0}
.np-art{width:46px;height:46px;border-radius:6px;background:var(--sur);flex-shrink:0;overflow:hidden;position:relative}
.np-art img{width:100%;height:100%;object-fit:cover;display:none;position:absolute;inset:0}
.np-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.np-info{min-width:0}
.np-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.np-artist{font-size:11px;color:var(--mut)}
.np-like{flex-shrink:0;color:var(--mut);padding:4px;transition:color var(--tr)}
.np-like:hover,.np-like.on{color:var(--acc)}
.pctrl{display:flex;flex-direction:column;align-items:center;gap:6px}
.pbtns{display:flex;align-items:center;gap:16px}
.pbtn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;color:var(--mut);transition:color var(--tr)}
.pbtn:hover{color:var(--txt)}
.pplay{width:40px;height:40px;background:var(--acc);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background var(--tr),transform var(--tr)}
.pplay:hover{background:var(--acc2);transform:scale(1.05)}
.prog{display:flex;align-items:center;gap:8px;width:100%}
.ptime{font-size:10px;color:var(--mut);min-width:28px}
.ptime.r{text-align:right}
.pbar{flex:1;height:4px;background:var(--bdr);border-radius:2px;cursor:pointer}
.pfill{height:100%;background:var(--acc);border-radius:2px;width:0}
.pright{display:flex;align-items:center;justify-content:flex-end;gap:8px}
.pvol{display:flex;align-items:center;gap:6px}
.pvolbar{width:70px;height:4px;background:var(--bdr);border-radius:2px;cursor:pointer}
.pvolfill{height:100%;background:var(--mut);border-radius:2px;width:70%}

/* YT Panel */
#ytp{position:fixed;top:64px;right:12px;width:290px;border-radius:10px;overflow:hidden;border:1px solid var(--bdr);box-shadow:0 8px 32px rgba(0,0,0,.6);display:none;z-index:50}
#ytp.on{display:block}
#ytp.drag{cursor:grabbing}
#ytdrag{background:var(--bg3);padding:6px 12px;display:flex;align-items:center;justify-content:space-between;cursor:grab;touch-action:none;user-select:none}
#ytdrag span{font-size:11px;color:var(--mut)}
#ytvid{background:#000}
#ytvid.hide{display:none}
#ytbar{background:var(--bg2);padding:8px 10px;display:flex;align-items:center;gap:8px}
#ytbar .ynp{flex:1;min-width:0}
#ytbar .ynt{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#ytbar .yna{font-size:11px;color:var(--mut)}
#ytbar .yimg{width:34px;height:34px;border-radius:4px;object-fit:cover;background:var(--sur);flex-shrink:0;display:none}
.ybtns{display:flex;align-items:center;gap:8px;flex-shrink:0}
.ybtn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;color:var(--mut);transition:color var(--tr)}
.ybtn:hover{color:var(--txt)}
.yplay{width:32px;height:32px;background:var(--acc);border-radius:50%;display:flex;align-items:center;justify-content:center}

/* Toast */
#toast{position:fixed;bottom:calc(var(--ph) + 14px);left:50%;transform:translateX(-50%) translateY(8px);background:var(--sur);border:1px solid var(--bdr);font-size:13px;padding:9px 18px;border-radius:20px;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;white-space:nowrap;z-index:200}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* EQ anim */
.eq{display:flex;align-items:flex-end;gap:2px;height:14px}
.eq span{width:3px;background:var(--acc);border-radius:1px;animation:eq .7s ease-in-out infinite alternate}
.eq span:nth-child(1){height:40%;animation-delay:0s}
.eq span:nth-child(2){height:100%;animation-delay:.15s}
.eq span:nth-child(3){height:60%;animation-delay:.3s}
.eq span:nth-child(4){height:80%;animation-delay:.1s}
@keyframes eq{from{transform:scaleY(.25)}to{transform:scaleY(1)}}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}
</style>
</head>
<body>
<div id="app">
  <div id="main">
    <div id="topbar">
      <div class="search-box">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="sinput" type="text" placeholder="Rechercher un titre, un artiste&hellip;" onkeydown="onKey(event)"/>

        <button class="pbtn" onclick="prevT()"><svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"/></svg></button>

</div>

<!-- YT Panel draggable -->
<div id="ytp">
  <div id="ytdrag">
    <span>&#9776; D&eacute;placer</span>
    <div style="display:flex;gap:8px">
      <button class="ybtn" onclick="toggleVid()" style="font-size:11px;padding:2px 8px;background:var(--bg2);border-radius:12px;height:auto;width:auto">Vid&eacute;o</button>

      <button class="ybtn" onclick="prevT()"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"/></svg></button>

    </div>

</div>

<div id="toast"></div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────
var KEY = 'AIzaSyAGo-7ERB8T7jr0xzIBsFDWjN5fNQbjAMQ';
var GENRES = [
  {n:'Power Metal',    q:'power metal official music video',   ic:'&#9876;&#65039;'},
  {n:'Symphonic Metal',q:'symphonic metal official',           ic:'&#127931;'},
  {n:'&Eacute;pique',  q:'epic orchestral metal music',        ic:'&#127984;'},
  {n:'Viking Metal',   q:'viking metal folk official',         ic:'&#129812;'},
  {n:'Folk Metal',     q:'folk metal official music video',    ic:'&#127897;'},
  {n:'Heavy Metal',    q:'heavy metal classic official',       ic:'&#129304;'}
];

// ─── ÉTAT ─────────────────────────────────────────────────────────
// Chaque "source" est un tableau nommé. play(src, i) joue tracks[src][i]
var tracks = {
  search: [],   // résultats de recherche
  hist:   [],   // historique
  favs:   [],   // favoris
  reco:   []    // recommandations
};
var cur = null;        // track en cours {id,title,artist,thumb}
var curSrc = '';       // source en cours
var curIdx = -1;       // index en cours dans tracks[curSrc]
var playing = false;
var shuffle = false;
var repeat  = false;
var muted   = false;
var vol     = 70;
var ptimer  = null;
var liked   = {};      // {id: true}
var favd    = {};      // {id: {id,title,artist,thumb}}
var theme   = 'dark';
var vidHide = false;

// ─── INIT ─────────────────────────────────────────────────────────
function init() {
  var lk = localStorage.getItem('snt_liked');
  if (lk) { liked = JSON.parse(lk); }
  var fd = localStorage.getItem('snt_favd');
  if (fd) { favd = JSON.parse(fd); }
  var hi = localStorage.getItem('snt_hist');
  if (hi) { tracks.hist = JSON.parse(hi); }
  theme = localStorage.getItem('snt_theme') || 'dark';
  applyTheme(theme);
  renderGenres();
  renderHist();
  renderFavs();
  initDrag();
}
document.addEventListener('DOMContentLoaded', init);

// ─── NAVIGATION ───────────────────────────────────────────────────
function showView(id) {
  var ids = ['vhome','vsearch','vfavs'];
  for (var i = 0; i < ids.length; i++) {
    document.getElementById(ids[i]).style.display = ids[i] === id ? '' : 'none';
  }
}

// ─── SEARCH ───────────────────────────────────────────────────────
function onKey(e) {
  if (e.key !== 'Enter') { return; }
  var q = e.target.value.trim();
  if (!q) { return; }
  showView('vsearch');
  doSearch(q);
}

function doSearch(q) {
  document.getElementById('stitle').textContent = '"' + q + '"';
  document.getElementById('scount').textContent = '';
  document.getElementById('sresults').innerHTML = '<div class="loading"><div class="spin"></div>Recherche\u2026</div>';
  var url = 'https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&videoCategoryId=10&maxResults=15&q='
    + encodeURIComponent(q) + '&key=' + KEY;
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (d.error) { document.getElementById('sresults').innerHTML = '<div class="loading">' + esc(d.error.message) + '</div>'; return; }
      var items = d.items || [];
      tracks.search = [];
      for (var i = 0; i < items.length; i++) {
        var it = items[i];
        var sn = it.snippet;
        var th = sn.thumbnails && sn.thumbnails.medium ? sn.thumbnails.medium.url : '';
        tracks.search.push({id:it.id.videoId, title:sn.title, artist:sn.channelTitle, thumb:th});
      }
      document.getElementById('scount').textContent = tracks.search.length + ' r\u00e9sultats';
      document.getElementById('sresults').innerHTML = renderList('search');
    })
    .catch(function() { document.getElementById('sresults').innerHTML = '<div class="loading">Erreur r\u00e9seau</div>'; });
}

// ─── RENDER LISTS ─────────────────────────────────────────────────
// renderList(src) retourne le HTML d'une tracklist pour tracks[src]
function renderList(src) {
  var arr = tracks[src];
  if (!arr.length) { return '<p style="color:var(--mut);font-size:14px;padding:8px 0">Aucun titre.</p>'; }
  var html = '<div class="tlist">';
  for (var i = 0; i < arr.length; i++) { html += rowHTML(src, i); }
  html += '</div>';
  return html;
}

function rowHTML(src, i) {
  var t = tracks[src][i];
  var isOn = cur && cur.id === t.id;
  var isLiked = !!liked[t.id];
  var eq = isOn && playing ? '<div class="eq"><span></span><span></span><span></span><span></span></div>' : '';
  return '<div class="trow' + (isOn ? ' on' : '') + '" onclick="play(\'' + src + '\',' + i + ')">'
    + '<img class="tthumb" src="' + esc(t.thumb) + '" onerror="this.style.visibility=\'hidden\'"/>'
    + '<div class="tinfo">'
    + (eq ? '<div class="tname">' + eq + '</div>' : '<div class="tname">' + esc(t.title) + '</div>')
    + '<div class="tartist">' + esc(t.artist) + '</div></div>'
    + '<button class="tlike' + (isLiked ? ' on' : '') + '" onclick="event.stopPropagation();like(\''
    + esc2(t.id) + '\',\'' + esc2(t.title) + '\',\'' + esc2(t.artist) + '\',\'' + esc2(t.thumb) + '\')">'
    + '<svg width="14" height="14" viewBox="0 0 24 24" fill="' + (isLiked ? 'currentColor' : 'none') + '" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>'
    + '</button></div>';
}

function renderHist() {
  var w = document.getElementById('vhist');
  if (!tracks.hist.length) {
    w.innerHTML = '<p style="color:var(--mut);font-size:14px;padding:4px 0">Lancez une recherche ou cliquez sur un genre.</p>';
    return;
  }
  w.innerHTML = renderList('hist');
}

function renderFavs() {
  var keys = Object.keys(liked);
  tracks.favs = [];
  for (var i = 0; i < keys.length; i++) {
    if (favd[keys[i]]) { tracks.favs.push(favd[keys[i]]); }
  }
  var w = document.getElementById('flist');
  if (!tracks.favs.length) {
    w.innerHTML = '<p style="color:var(--mut);font-size:14px;padding:4px 0">Aucun favori.</p>';
    return;
  }
  w.innerHTML = renderList('favs');
}

// ─── PLAY ─────────────────────────────────────────────────────────
function play(src, i) {
  var t = tracks[src][i];
  if (!t) { console.log('play: introuvable', src, i); return; }
  curSrc = src;
  curIdx = i;
  cur = t;
  playing = true;
  loadEmbed(t.id, true);
  updNP(t);
  addHist(t);
  loadReco(t.id);
  refreshAll();
  toast('\u25b6 ' + t.title);
}

function togglePlay() {
  if (!cur) { toast('S\u00e9lectionnez un titre'); return; }
  playing = !playing;
  loadEmbed(cur.id, playing);
  updPlayIco();
}

function prevT() {
  if (curSrc && curIdx > 0) { play(curSrc, curIdx - 1); }
}

function nextT() {
  if (!curSrc) { return; }
  var arr = tracks[curSrc];
  if (!arr || !arr.length) { return; }
  var n;
  if (shuffle) { n = Math.floor(Math.random() * arr.length); }
  else if (repeat) { n = curIdx; }
  else { n = (curIdx + 1) % arr.length; }
  play(curSrc, n);
}

function toggleShuffle() {
  shuffle = !shuffle;
  document.getElementById('bshuffle').style.color = shuffle ? 'var(--acc)' : '';
  toast(shuffle ? 'Al\u00e9atoire ON' : 'Al\u00e9atoire OFF');
}

function toggleRepeat() {
  repeat = !repeat;
  document.getElementById('brepeat').style.color = repeat ? 'var(--acc)' : '';
  toast(repeat ? 'R\u00e9p\u00e9tition ON' : 'R\u00e9p\u00e9tition OFF');
}

// ─── HISTORIQUE ───────────────────────────────────────────────────
function addHist(t) {
  // Éviter les doublons consécutifs
  var filtered = [];
  for (var i = 0; i < tracks.hist.length; i++) {
    if (tracks.hist[i].id !== t.id) { filtered.push(tracks.hist[i]); }
  }
  tracks.hist = [t].concat(filtered).slice(0, 20);
  localStorage.setItem('snt_hist', JSON.stringify(tracks.hist));
}

// ─── LIKE ─────────────────────────────────────────────────────────
function like(id, title, artist, thumb) {
  if (liked[id]) {
    delete liked[id];
    delete favd[id];
    toast('Retir\u00e9 des favoris');
  } else {
    liked[id] = true;
    favd[id] = {id:id, title:title, artist:artist, thumb:thumb};
    localStorage.setItem('snt_favd', JSON.stringify(favd));
    toast('Ajout\u00e9 aux favoris \u2665');
  }
  localStorage.setItem('snt_liked', JSON.stringify(liked));
  refreshAll();
  updLikeBtn();
}

function toggleLike() {
  if (!cur) { return; }
  like(cur.id, cur.title, cur.artist, cur.thumb || '');
}

// ─── EMBED YT ─────────────────────────────────────────────────────
function loadEmbed(vid, autoplay) {
  var c = document.getElementById('ytvid');
  var src = 'https://www.youtube.com/embed/' + vid
    + '?autoplay=' + (autoplay ? '1' : '0') + '&rel=0&modestbranding=1';
  c.innerHTML = '<iframe src="' + src + '" width="100%" height="190" frameborder="0" allow="autoplay;encrypted-media" allowfullscreen style="display:block"></iframe>';
  document.getElementById('ytp').classList.add('on');
}

// ─── RECOS ────────────────────────────────────────────────────────
function loadReco(vid) {
  var url = 'https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&relatedToVideoId='
    + vid + '&videoCategoryId=10&maxResults=8&key=' + KEY;
  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (!d.items) { return; }
      tracks.reco = [];
      for (var i = 0; i < d.items.length; i++) {
        var it = d.items[i];
        if (!it.id || !it.id.videoId || it.id.videoId === vid) { continue; }
        var sn = it.snippet;
        var th = sn.thumbnails && sn.thumbnails.medium ? sn.thumbnails.medium.url : '';
        tracks.reco.push({id:it.id.videoId, title:sn.title, artist:sn.channelTitle, thumb:th});
      }
      if (!tracks.reco.length) { return; }
      var html = '';
      for (var j = 0; j < tracks.reco.length; j++) {
        var t = tracks.reco[j];
        html += '<div class="rcard" onclick="play(\'reco\',' + j + ')">'
          + '<img class="rthumb" src="' + esc(t.thumb) + '" onerror="this.style.opacity=.3"/>'
          + '<div class="rtitle">' + esc(t.title) + '</div>'
          + '<div class="rsub">' + esc(t.artist) + '</div></div>';
      }
      document.getElementById('rlist').innerHTML = html;
      document.getElementById('vreco').style.display = '';
    })
    .catch(function() {});
}

// ─── GENRES ───────────────────────────────────────────────────────
function renderGenres() {
  var html = '';
  for (var i = 0; i < GENRES.length; i++) {
    html += '<div class="card" onclick="searchGenre(' + i + ')">'
      + '<div class="card-img">'
      + '<div class="card-icon" id="gic' + i + '">' + GENRES[i].ic + '</div>'
      + '<img class="card-cover" id="gcov' + i + '" src="" alt=""/>'
      + '</div>'
      + '<div class="card-name">' + GENRES[i].n + '</div>'
      + '<div class="card-sub">Explorer</div></div>';
  }
  document.getElementById('gcards').innerHTML = html;
  loadCovers();
}

function searchGenre(i) {
  var g = GENRES[i];
  document.getElementById('sinput').value = g.q;
  showView('vsearch');
  doSearch(g.q);
}

function loadCovers() {
  for (var i = 0; i < GENRES.length; i++) {
    (function(idx) {
      var url = 'https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=1&q='
        + encodeURIComponent(GENRES[idx].q) + '&key=' + KEY;
      fetch(url)
        .then(function(r) { return r.json(); })
        .then(function(d) {
          if (!d.items || !d.items[0]) { return; }
          var sn = d.items[0].snippet;
          var th = sn.thumbnails && sn.thumbnails.medium ? sn.thumbnails.medium.url : '';
          if (!th) { return; }
          var img = document.getElementById('gcov' + idx);
          var ic  = document.getElementById('gic'  + idx);
          if (!img || !ic) { return; }
          img.onload = function() { img.style.display = ''; ic.style.display = 'none'; };
          img.src = th;
        })
        .catch(function(e) { console.log('cover', idx, e.message); });
    })(i);
  }
}

// ─── NP / ICÔNES ──────────────────────────────────────────────────
function updNP(t) {
  document.getElementById('nptitle').textContent  = t.title;
  document.getElementById('npartist').textContent = t.artist;
  document.getElementById('ytitle').textContent   = t.title;
  document.getElementById('yartist').textContent  = t.artist;
  var img = document.getElementById('npimg');
  var ph  = document.getElementById('npph');
  var yim = document.getElementById('ytimg');
  if (t.thumb) {
    img.src = t.thumb; img.style.display = ''; ph.style.display = 'none';
    yim.src = t.thumb; yim.style.display = '';
  } else {
    img.style.display = 'none'; ph.style.display = '';
    yim.style.display = 'none';
  }
  updPlayIco();
  updLikeBtn();
}

function updPlayIco() {
  var pause = '<rect x="6" y="4" width="4" height="16" fill="white"/><rect x="14" y="4" width="4" height="16" fill="white"/>';
  var play  = '<polygon points="5 3 19 12 5 21 5 3" fill="white"/>';
  document.getElementById('pico').innerHTML  = playing ? pause : play;
  document.getElementById('ypico').innerHTML = playing ? pause : play;
}

function updLikeBtn() {
  var btn = document.getElementById('nplike');
  if (!cur) { return; }
  var on = !!liked[cur.id];
  btn.classList.toggle('on', on);
  btn.querySelector('svg').setAttribute('fill', on ? 'currentColor' : 'none');
}

function refreshAll() {
  renderHist();
  renderFavs();
  // Rafraîchir la liste search si visible
  var sw = document.getElementById('sresults');
  if (sw.querySelector('.tlist') && tracks.search.length) {
    sw.innerHTML = renderList('search');
  }
}

// ─── PROGRESS (simulé — pas d'API JS avec embed) ──────────────────
function seekBar(e) { toast('Utilisez les contr\u00f4les de la vid\u00e9o'); }

// ─── VOLUME ───────────────────────────────────────────────────────
function setVol(e) {
  var rect = e.currentTarget.getBoundingClientRect();
  vol = Math.round(Math.max(0, Math.min(100, (e.clientX - rect.left) / e.currentTarget.offsetWidth * 100)));
  muted = false;
  document.getElementById('vfill').style.width = vol + '%';
}
function toggleMute() {
  muted = !muted;
  document.getElementById('vfill').style.width = muted ? '0' : vol + '%';
}

// ─── YT PANEL ─────────────────────────────────────────────────────
function toggleYTP() { document.getElementById('ytp').classList.toggle('on'); }
function closeYTP()  { document.getElementById('ytp').classList.remove('on'); }
function toggleVid() {
  vidHide = !vidHide;
  document.getElementById('ytvid').style.display = vidHide ? 'none' : '';
}

// ─── DRAG ─────────────────────────────────────────────────────────
function initDrag() {
  var panel = document.getElementById('ytp');
  var handle = document.getElementById('ytdrag');
  var sx, sy, ox, oy;
  function start(e) {
    var touch = e.touches ? e.touches[0] : e;
    sx = touch.clientX; sy = touch.clientY;
    var r = panel.getBoundingClientRect();
    ox = r.left; oy = r.top;
    panel.style.right = 'auto';
    panel.style.left  = ox + 'px';
    panel.style.top   = oy + 'px';
    panel.classList.add('drag');
    document.addEventListener('mousemove', move);
    document.addEventListener('touchmove', move, {passive:false});
    document.addEventListener('mouseup',   stop);
    document.addEventListener('touchend',  stop);
  }
  function move(e) {
    if (e.cancelable) { e.preventDefault(); }
    var touch = e.touches ? e.touches[0] : e;
    var nl = Math.max(0, Math.min(window.innerWidth  - panel.offsetWidth,  ox + touch.clientX - sx));
    var nt = Math.max(0, Math.min(window.innerHeight - panel.offsetHeight, oy + touch.clientY - sy));
    panel.style.left = nl + 'px';
    panel.style.top  = nt + 'px';
  }
  function stop() {
    panel.classList.remove('drag');
    document.removeEventListener('mousemove', move);
    document.removeEventListener('touchmove', move);
    document.removeEventListener('mouseup',   stop);
    document.removeEventListener('touchend',  stop);
  }
  handle.addEventListener('mousedown',  start);
  handle.addEventListener('touchstart', start, {passive:true});
}

// ─── THÈME ────────────────────────────────────────────────────────
function toggleTheme() {
  theme = theme === 'dark' ? 'light' : 'dark';
  applyTheme(theme);
  localStorage.setItem('snt_theme', theme);
}
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
}

// ─── UTILS ────────────────────────────────────────────────────────
function fmt(s) {
  if (!s || isNaN(s)) { return '0:00'; }
  var m = Math.floor(s / 60);
  var r = Math.round(s % 60);
  return m + ':' + (r < 10 ? '0' : '') + r;
}
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function esc2(s) {
  return String(s || '').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
}
var _tt;
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('on');
  clearTimeout(_tt);
  _tt = setTimeout(function() { el.classList.remove('on'); }, 2400);
}
</script>
